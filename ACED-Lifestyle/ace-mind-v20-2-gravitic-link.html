<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes" />
<title>ACE Mind v19.8 · Domain Arrow Matrix</title>
<style>

    :root {
      --gold: #B8960C;
      --gold-light: #fde68a;
      --gold-mid: #D4A017;
      --navy: #020818;
      --navy-mid: #040e24;
      --navy-light: #0a1a3a;
      --teal: #00C6C6;
      --purple: #7B2FBE;
      --text: #e2e8f0;
      --muted: #94a3b8;
    }

:root{--bg:#050611;--panel:#0c1020;--panel2:#12172b;--gold:#d6a84f;--gold2:#fde68a;--cyan:#22d3ee;--muted:#94a3b8;--line:rgba(214,168,79,.32);--red:#ef4444;--orange:#f97316;--yellow:#facc15;--green:#22c55e;--blue:#93c5fd;--violet:#a78bfa;}
*{box-sizing:border-box} html,body{margin:0;padding:0;background:radial-gradient(circle at 50% 0%,rgba(34,211,238,.15),transparent 30%),radial-gradient(circle at 85% 15%,rgba(167,139,250,.12),transparent 28%),#050611;color:#e2e8f0;font-family:Georgia,'Times New Roman',serif;min-height:100vh} body{padding:12px}.app{max-width:760px;margin:0 auto}.hidden{display:none!important}.boot{position:fixed;inset:0;z-index:9999;background:#020818;display:flex;align-items:center;justify-content:center;transition:opacity .6s;padding:20px}.boot.out{opacity:0;pointer-events:none}.boot-card,.portal-card{width:min(78vw,360px);aspect-ratio:2.5/3.5;border-radius:24px;border:1px solid var(--line);background:linear-gradient(145deg,#090d1b,#03050d);box-shadow:0 28px 80px rgba(0,0,0,.65),inset 0 0 50px rgba(214,168,79,.07);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden}.boot-card:before,.portal-card:before{content:'♠';font-size:90px;color:rgba(253,230,138,.12);position:absolute;top:12px;right:24px}.logo-mark{font-size:44px;color:var(--gold2);letter-spacing:7px;text-shadow:0 0 22px rgba(214,168,79,.35)}.logo-sub{font-size:10px;color:var(--cyan);letter-spacing:3px;text-transform:uppercase;margin-top:8px}.hero{border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:12px;background:linear-gradient(145deg,rgba(12,16,32,.92),rgba(4,6,18,.94));text-align:center}.hero-title{font-size:24px;color:var(--gold2);letter-spacing:4px;font-weight:bold}.hero-sub{font-size:10px;color:var(--muted);letter-spacing:1.8px;margin-top:6px}.status-seal{margin-top:10px;font-size:9px;color:#bbf7d0;border:1px solid rgba(34,197,94,.25);display:inline-block;padding:4px 8px;border-radius:999px;background:rgba(34,197,94,.08)}.portal{display:flex;flex-direction:column;align-items:center;gap:14px}.portal-deck{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;touch-action:pan-y}.arrow{width:42px;height:42px;border-radius:999px;border:1px solid rgba(214,168,79,.35);background:rgba(12,16,32,.76);color:var(--gold2);font-size:24px}.portal-card{cursor:pointer;transition:transform .2s,opacity .2s;width:min(68vw,315px)}.portal-card:active{transform:scale(.985)}.suit-big{font-size:72px;color:var(--gold2)}.suit-title{font-size:19px;color:#fff;letter-spacing:2px;margin-top:8px}.suit-text{font-size:11px;color:var(--muted);max-width:230px;line-height:1.55;margin-top:8px}.dots{display:flex;gap:6px}.dot{width:8px;height:8px;border-radius:50%;background:#334155}.dot.active{background:var(--gold2)}.daybar{position:sticky;top:0;z-index:50;background:linear-gradient(180deg,rgba(5,6,17,.98),rgba(5,6,17,.86));backdrop-filter:blur(8px);padding:8px 0;margin-bottom:8px}.day-ribbon{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}.day-ribbon::-webkit-scrollbar{display:none}.day-btn{flex:0 0 auto;border:1px solid rgba(148,163,184,.22);background:#0a0f1c;color:#94a3b8;border-radius:9px;padding:7px 8px;min-width:64px;font-family:inherit}.day-btn.active{border-color:var(--gold);color:var(--gold2);background:rgba(214,168,79,.12)}.day-btn .d{font-size:13px}.day-btn .b{font-size:8px;color:#93c5fd;margin-top:2px}.nav-icons{display:flex;justify-content:center;gap:8px;margin:8px 0}.nav-icons button{width:44px;height:38px;border-radius:10px;border:1px solid rgba(214,168,79,.28);background:#0b1020;color:#94a3b8;font-size:20px}.nav-icons button.active{background:rgba(214,168,79,.14);color:var(--gold2)}.chamber{display:none}.chamber.active{display:block}.panel{border:1px solid rgba(214,168,79,.24);background:linear-gradient(145deg,rgba(12,16,32,.92),rgba(8,10,22,.94));border-radius:14px;padding:12px;margin-bottom:10px;box-shadow:0 12px 32px rgba(0,0,0,.18)}.panel-title{font-size:11px;color:var(--gold2);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:9px;font-weight:bold}.focus-title{font-size:18px;color:#fff;margin-bottom:6px}.small{font-size:10px;color:var(--muted);line-height:1.5}.row{display:flex;justify-content:space-between;gap:10px;border-bottom:1px solid rgba(255,255,255,.06);padding:6px 0;font-size:11px}.row:last-child{border-bottom:0}.k{color:#93c5fd;text-transform:uppercase;letter-spacing:.8px;font-size:9px;min-width:95px}.v{text-align:right;color:#e2e8f0}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.domain-grid{display:grid;grid-template-columns:1fr;gap:7px}.domain-card{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);border-radius:9px;padding:9px}.domain-card b{color:#fde68a;font-size:10px;text-transform:uppercase;letter-spacing:.8px}.domain-card div{font-size:11px;color:#cbd5e1;line-height:1.45;margin-top:3px}.body-grid{display:grid;grid-template-columns:1fr;gap:6px}.body-row{display:grid;grid-template-columns:82px 1fr 50px;gap:6px;align-items:center;padding:7px;border-radius:8px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.025)}.body-name{font-size:9px;color:#cbd5e1;text-transform:uppercase;letter-spacing:.6px}.body-actions{display:flex;gap:4px;justify-content:center}.body-actions button{font-size:9px;border-radius:6px;border:1px solid rgba(148,163,184,.25);background:#0b1020;color:#94a3b8;padding:4px 5px}.state{font-size:9px;font-weight:bold;text-align:right}.green{color:#86efac}.yellow{color:#fde68a}.orange{color:#fdba74}.red{color:#fca5a5}.supp-group{border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:9px;margin-bottom:8px;background:rgba(255,255,255,.025)}.supp-head{font-size:10px;color:#fde68a;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}.supp-item{display:grid;grid-template-columns:26px 1fr auto;gap:8px;padding:7px 5px;border-top:1px solid rgba(255,255,255,.05);align-items:start}.supp-item:first-of-type{border-top:0}.check{width:18px;height:18px;border-radius:4px;border:1.5px solid #64748b;margin-top:1px;display:flex;align-items:center;justify-content:center;color:#050611}.check.checked{background:#22c55e;border-color:#22c55e}.check.checked:after{content:'✓';font-size:12px;font-weight:bold}.supp-name{font-size:11px;color:#e2e8f0;font-weight:bold}.supp-note{font-size:9px;color:#94a3b8;margin-top:2px;line-height:1.35}.tag{font-size:8px;border-radius:3px;padding:2px 5px;font-weight:bold}.tag.L{background:rgba(34,197,94,.18);color:#86efac}.tag.M{background:rgba(245,158,11,.18);color:#fde68a}.tag.H{background:rgba(239,68,68,.18);color:#fca5a5}.supp-item.dim{opacity:.55}.supp-item.watch{box-shadow:inset 3px 0 rgba(245,158,11,.6)}.practice-card{border-left:3px solid var(--gold);background:rgba(255,255,255,.035);border-radius:0 8px 8px 0;padding:9px;margin-bottom:8px;font-size:11px;line-height:1.45}.practice-card b{color:#fde68a}.adv-actions{display:flex;gap:8px;flex-wrap:wrap}.btn{border:1px solid rgba(214,168,79,.35);background:#0b1020;color:#fde68a;border-radius:9px;padding:9px 11px;font-family:inherit;font-size:11px}.btn.blue{border-color:rgba(34,211,238,.35);color:#a5f3fc}.textarea{width:100%;min-height:120px;background:#090d18;border:1px solid rgba(255,255,255,.12);border-radius:9px;color:#e2e8f0;padding:9px;font-family:monospace;font-size:10px}.note{font-size:10px;color:#94a3b8;line-height:1.55}.warn{border-left:3px solid #f97316;background:rgba(249,115,22,.08);padding:8px;border-radius:0 8px 8px 0;color:#fdba74;font-size:10px;line-height:1.45}.footer{font-size:9px;color:#64748b;text-align:center;padding:20px 0}@media(max-width:620px){body{padding:8px}.grid{grid-template-columns:1fr}.body-row{grid-template-columns:70px 1fr 44px}.portal-card{width:min(74vw,300px)}.arrow{width:36px;height:36px}}

.supp-item{cursor:pointer;}
.supp-item .check{cursor:pointer;}
.supp-item .check:hover{box-shadow:0 0 0 3px rgba(34,197,94,.12)}
.supp-card-hint{font-size:8px;color:#64748b;margin-top:3px;letter-spacing:.2px}
.supp-modal-backdrop{position:fixed;inset:0;z-index:99997;background:rgba(0,0,0,.74);display:none;align-items:center;justify-content:center;padding:14px;}
.supp-modal-backdrop.open{display:flex;}
.supp-modal{width:min(680px,100%);max-height:88vh;overflow:auto;border:1px solid rgba(214,168,79,.52);border-radius:16px;background:linear-gradient(145deg,#07101d,#050814);box-shadow:0 24px 80px rgba(0,0,0,.68);padding:14px;}
.supp-modal-title{font-size:18px;color:#fde68a;font-weight:bold;margin-bottom:4px;}
.supp-modal-sub{font-size:10px;color:#93c5fd;line-height:1.45;margin-bottom:10px;}
.supp-modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.supp-modal-box{border:1px solid rgba(255,255,255,.09);background:rgba(255,255,255,.035);border-radius:10px;padding:9px;font-size:11px;line-height:1.48;color:#cbd5e1;}
.supp-modal-box b{display:block;color:#a5b4fc;font-size:9px;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.supp-modal-box ul{margin:0;padding-left:17px;}
.supp-modal-box li{margin-bottom:4px;}
.supp-modal-actions{display:flex;gap:8px;justify-content:flex-end;flex-wrap:wrap;margin-top:11px;}
.supp-modal-note{margin-top:10px;font-size:9px;color:#94a3b8;line-height:1.45;border-left:2px solid rgba(214,168,79,.35);padding-left:8px;}
@media(max-width:620px){.supp-modal-grid{grid-template-columns:1fr}.supp-modal{padding:12px}}

</style>

// ── Swipe handler (pinch-zoom safe) ──────────────────────────
(function(){
  let startX=0, startY=0, startDist=0, isPinch=false;
  
  function getTouchDist(e){
    if(e.touches.length<2) return 0;
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    return Math.sqrt(dx*dx+dy*dy);
  }
  
  function onStart(e){
    if(e.touches.length===2){ isPinch=true; startDist=getTouchDist(e); return; }
    isPinch=false;
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
  }
  
  function onEnd(e, swipeFn){
    if(isPinch){ isPinch=false; return; }
    const dx=e.changedTouches[0].clientX-startX;
    const dy=e.changedTouches[0].clientY-startY;
    // Only fire if horizontal swipe dominates vertical (not scrolling)
    if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.5) swipeFn(dx<0?1:-1);
  }
  
  // Portal deck swipe (change portal card)
  const deck=document.getElementById('portalDeck');
  deck.addEventListener('touchstart',onStart,{passive:true});
  deck.addEventListener('touchend',e=>onEnd(e,movePortal),{passive:true});
  
  // Chambers swipe (change chamber/tab)
  const shell=document.getElementById('mainShell');
  shell.addEventListener('touchstart',onStart,{passive:true});
  shell.addEventListener('touchend',function(e){
    if(isPinch){ isPinch=false; return; }
    const dx=e.changedTouches[0].clientX-startX;
    const dy=e.changedTouches[0].clientY-startY;
    // Only horizontal dominant swipes, not on day ribbon (let that scroll)
    const target=e.target.closest('.day-ribbon');
    if(target) return; // let day ribbon scroll freely
    if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.5){
      const dir=dx<0?1:-1;
      const next=(activeChamber+dir+SUITS.length)%SUITS.length;
      setChamber(next);
    }
  },{passive:true});
})();

.domain-arrow.yellow{color:#facc15}.domain-card.arrow-card.yellow{border-color:rgba(250,204,21,.46);background:rgba(250,204,21,.07)}
.domain-arrow.orange{color:#fb923c}.domain-card.arrow-card.orange{border-color:rgba(251,146,60,.52);background:rgba(251,146,60,.085)}
.domain-arrow.red{color:#ef4444}.domain-card.arrow-card.red{border-color:rgba(239,68,68,.54);background:rgba(239,68,68,.095)}
.domain-score-dot{width:5px;height:5px;border-radius:999px;background:currentColor;opacity:.72;margin-top:6px}
@media(max-width:620px){.domain-grid.arrow-grid{grid-template-columns:repeat(3,1fr);gap:6px}.domain-card.arrow-card{min-height:66px}.domain-arrow{font-size:30px}.domain-card.arrow-card b{font-size:8px}}

<script id="ace-v19-8-domain-arrow-matrix">
/*
  v19.8 Domain Arrow Matrix
  - Life domains render as arrows only.
  - Body state is not read by this matrix.
  - Domains are affected according to how strongly the esoteric/personal convergence touches them.
  - Bad weather does not paint all domains red. Good weather does not paint all domains green.
*/
(function(){
  const DOMAIN_ORDER_V198 = ['adapt','study','love','social','rejuvenate','crypto','create','travel','theon'];
  const DOMAIN_LABELS_V198 = {adapt:'Adapt',study:'Study',love:'Love',social:'Social',rejuvenate:'Rejuvenate',crypto:'Crypto',create:'Create',travel:'Travel',theon:'THEON'};
  const MODE_WEIGHTS_BY_DOMAIN_V198 = {
    adapt:{GROUND:1.15,REGULATE:.85,COMMUNICATE:.70,VISION:.65,DRIVE:.45,CREATE:.35,PURIFY:.25,PLAYFUL_RESET:.20},
    study:{COMMUNICATE:1.20,VISION:1.05,GROUND:.55,REGULATE:.50,CREATE:.45,PURIFY:.20,PLAYFUL_RESET:.15,DRIVE:.15},
    love:{PLAYFUL_RESET:1.15,COMMUNICATE:.70,CREATE:.55,PURIFY:.45,GROUND:.40,VISION:.30,REGULATE:.30,DRIVE:.20},
    social:{COMMUNICATE:1.20,PLAYFUL_RESET:.75,CREATE:.55,VISION:.45,GROUND:.25,REGULATE:.25,DRIVE:.20,PURIFY:.15},
    rejuvenate:{PURIFY:1.20,GROUND:1.05,PLAYFUL_RESET:.65,REGULATE:.55,DRIVE:.35,COMMUNICATE:.25,VISION:.20,CREATE:.15},
    crypto:{VISION:1.15,GROUND:.85,DRIVE:.70,REGULATE:.60,COMMUNICATE:.35,CREATE:.25,PURIFY:.20,PLAYFUL_RESET:.10},
    create:{CREATE:1.25,VISION:.95,COMMUNICATE:.85,PLAYFUL_RESET:.55,DRIVE:.35,GROUND:.30,PURIFY:.25,REGULATE:.20},
    travel:{VISION:1.15,DRIVE:.65,COMMUNICATE:.55,CREATE:.35,PURIFY:.30,GROUND:.25,PLAYFUL_RESET:.20,REGULATE:.15},
    theon:{VISION:1.25,COMMUNICATE:.85,GROUND:.75,REGULATE:.70,PURIFY:.45,CREATE:.40,DRIVE:.25,PLAYFUL_RESET:.15}
  };
  const NOTE_PRESSURE_V198 = {
    'single-variable timing':{crypto:-1.10,travel:-.50,social:-.45,love:-.35,study:-.25,theon:.15,adapt:-.10,create:-.15,rejuvenate:.10},
    'closure/detox timing':{rejuvenate:.75,love:.20,create:-.25,crypto:-.55,social:-.25,travel:-.20,adapt:.05,study:.05,theon:.25},
    'Water/resource pressure on Wu Earth':{crypto:-.75,adapt:-.45,social:-.30,love:-.20,rejuvenate:.20,study:.15,theon:.20,create:-.10,travel:-.20},
    'Wood authority pressure on Wu Earth':{adapt:-.70,rejuvenate:-.20,love:-.10,social:-.15,study:.20,theon:.25,create:.10,crypto:-.25,travel:-.10},
    'astrological opposition':{love:-1.05,social:-.85,crypto:-.70,adapt:-.35,travel:-.30,create:-.15,study:.00,theon:.10,rejuvenate:.10},
    'late-degree transition':{travel:-.50,social:-.35,crypto:-.40,adapt:-.20,love:-.20,study:.05,theon:.10,create:.05,rejuvenate:.05},
    'Mars activation':{adapt:.35,crypto:-.20,create:.25,travel:.15,love:-.10,social:-.10,study:.10,theon:.10,rejuvenate:-.10},
    'supportive expansion aspect':{adapt:.45,study:.40,create:.45,travel:.35,theon:.35,crypto:.20,love:.25,social:.25,rejuvenate:.15},
    'Fire resource support':{study:.35,create:.35,adapt:.25,theon:.25,love:.15,social:.15,crypto:.10,travel:.10,rejuvenate:.10},
    'Earth grounding support':{adapt:.40,rejuvenate:.35,crypto:.30,theon:.25,study:.20,love:.15,social:.05,create:.05,travel:.05},
    'release/closure tone':{rejuvenate:.40,theon:.25,love:.10,crypto:-.35,social:-.20,travel:-.15,create:-.10,adapt:.00,study:.05},
    'activation requires channeling':{create:.30,adapt:.25,study:.15,theon:.20,crypto:-.25,social:-.10,love:-.10,travel:.05,rejuvenate:-.05}
  };
  function scoreForDomainV198(domain, c){
    const scores = c.personalScores || c.rawScores || {};
    const weights = MODE_WEIGHTS_BY_DOMAIN_V198[domain] || {};
    let v = 0;
    for(const [mode,w] of Object.entries(weights)) v += (Number(scores[mode]||0) * w);
    return v;
  }
  function normalizeDomainImpactsV198(c){
    const raw={}; let max=0;
    for(const d of DOMAIN_ORDER_V198){ raw[d]=scoreForDomainV198(d,c); if(raw[d]>max) max=raw[d]; }
    max = max || 1;
    const out={}; for(const d of DOMAIN_ORDER_V198) out[d]=raw[d]/max;
    return out;
  }
  function noteAdjustmentV198(domain, c){
    let adj = 0;
    const notes = c.esotericWeather && Array.isArray(c.esotericWeather.notes) ? c.esotericWeather.notes : [];
    for(const n of notes){
      const table = NOTE_PRESSURE_V198[n];
      if(table && typeof table[domain] === 'number') adj += table[domain];
    }
    return adj;
  }
  function domainSignalV198(domain, c){
    const impacts = normalizeDomainImpactsV198(c);
    const touch = impacts[domain] || 0;
    const label = c.esotericWeather?.label || 'GREEN_LIGHT';
    let score = 0;
    if(label === 'GREEN_LIGHT') score = 0.15 + (1.55 * touch);
    else if(label === 'ACTIVE_WITH_CAPS') score = -0.05 + (0.95 * touch);
    else if(label === 'CAUTION') score = 0.10 - (1.45 * touch);
    else score = -0.10;
    score += noteAdjustmentV198(domain,c);
    // If a domain is barely touched, keep it closer to neutral even in strong weather.
    if(touch < .28) score *= .45;
    else if(touch < .45) score *= .70;
    let color='yellow', arrow='→', value=0;
    if(score >= 1.28){ color='green'; arrow='↑'; value=2; }
    else if(score >= .48){ color='blue'; arrow='↗'; value=1; }
    else if(score <= -1.15){ color='red'; arrow='↓'; value=-2; }
    else if(score <= -.42){ color='orange'; arrow='↘'; value=-1; }
    return {domain,label:DOMAIN_LABELS_V198[domain]||domain,color,arrow,value,score:Number(score.toFixed(2)),touch:Number(touch.toFixed(2))};
  }
  window.domainSignalV198 = domainSignalV198;
  window.lifeDomains = lifeDomains = function(d,c,block){
    const out={};
    for(const domain of DOMAIN_ORDER_V198){ out[domain] = domainSignalV198(domain,c); }
    return out;
  };
  window.renderLife = renderLife = function(l){
    const entries = DOMAIN_ORDER_V198.map(k=>[k,l[k]]).filter(x=>x[1]);
    return '<div class="domain-grid arrow-grid">'+entries.map(([k,v])=>{
      const label = escapeHTML(v.label || DOMAIN_LABELS_V198[k] || k);
      const color = escapeHTML(v.color || 'yellow');
      const arrow = escapeHTML(v.arrow || '→');
      return '<div class="domain-card arrow-card '+color+'" data-domain="'+escapeHTML(k)+'" data-score="'+escapeHTML(v.score)+'" data-touch="'+escapeHTML(v.touch)+'"><b>'+label+'</b><div class="domain-arrow '+color+'">'+arrow+'</div><div class="domain-score-dot '+color+'"></div></div>';
    }).join('')+'</div>';
  };
  const previousBuildAIContextV198 = window.buildAIContext || buildAIContext;
  window.buildAIContext = buildAIContext = function(full=false){
    const d=ANCHORS[activeIdx], g=deriveGuidance(d), c=g.c;
    const domainLine = DOMAIN_ORDER_V198.map(k=>{const s=domainSignalV198(k,c); return (DOMAIN_LABELS_V198[k]||k)+':'+s.arrow+'/'+s.color;}).join(' ');
    const base = previousBuildAIContextV198(full);
    return base + '\nLife domain arrows only: ' + domainLine + '. Body state does not affect these arrows.';
  };
  try{document.title='ACE Mind v19.8 · Domain Arrow Matrix';}catch(e){}
  try{document.querySelector('.hero-sub').textContent='v19.8 · life domains = esoteric impact arrows · body separate';}catch(e){}
  try{document.querySelector('.footer').textContent='ACE Mind v19.8 · life domains are arrows only; body state never changes them.';}catch(e){}
  try{ if(typeof render==='function') render(); }catch(e){ console.error('v19.8 rerender failed', e); }
})();
</script>
