<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover" />
<meta name="theme-color" content="#02040a" />
<title>ACE Prism</title>
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="mobile-web-app-capable" content="yes" />
<style>
html,body{margin:0;width:100%;height:100%;background:#000;overflow:hidden}
iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#02040a;opacity:0;transition:opacity .35s ease}
iframe.ready{opacity:1}
.boot{position:fixed;inset:0;z-index:5;display:grid;place-items:center;background:#000;transition:opacity .45s ease,visibility .45s}
.boot.off{opacity:0;visibility:hidden;pointer-events:none}
.boot img{width:min(72vw,390px);border-radius:34px;box-shadow:0 0 80px rgba(32,231,255,.15),0 0 80px rgba(255,79,216,.12)}
</style>
</head>
<body>
<div class="boot" id="boot"><img src="../ACED-Lifestyle/shared/assets/logos/ace-prism.png" alt="ACE Prism" /></div>
<iframe id="appFrame" src="../ACED-Lifestyle/ace-prism.html?v=1.1.1" title="ACE Prism"></iframe>
<script>
(function(){
  const frame=document.getElementById('appFrame'),boot=document.getElementById('boot');
  function ready(){frame.classList.add('ready');setTimeout(()=>boot.classList.add('off'),260)}
  frame.addEventListener('load',ready);
  window.addEventListener('message',e=>{if(e.origin===location.origin&&e.data&&e.data.type==='ace_prism_ready')ready()});
  setTimeout(ready,2200);
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js?v=1.1.1',{scope:'./'}).catch(console.warn));
  }
})();
</script>
</body>
</html>
