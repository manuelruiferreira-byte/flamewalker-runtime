/* v21.4 final gates */
.conv-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}
.conv-card{border:1px solid rgba(214,168,79,.18);background:rgba(255,255,255,.028);border-radius:16px;padding:11px;min-height:92px}
.conv-card b{display:block;color:#fde68a;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px}
.conv-card div{font-size:.86rem;color:#cbd5e1;line-height:1.42}
.conv-synthesis{border-left:3px solid var(--cyan);background:rgba(34,211,238,.07);border-radius:0 14px 14px 0;padding:11px;margin-top:10px;color:#dbeafe;font-size:.91rem;line-height:1.45}

/* v21.11 AI anchor handoff: model choices are real links for mobile reliability */

/* v21.14 logo-skin: visual-only ACE Mind palette refinement.
   Mechanics, data, AI handoff, boot, router, supplements, and state logic untouched. */
:root{
  --bg:#01030a;
  --panel:rgba(4,11,25,.90);
  --panel2:rgba(7,20,42,.78);
  --gold:#d9a64a;
  --gold2:#fff0ad;

  --violet:#8b5cf6;
  --red:#ff4f6d;

  --orange:#ff9b4a;
  --yellow:#ffe169;
  --blue:#82caff;
  --text:#fff5d6;
  --muted:#9fb4ce;
  --line:rgba(217,166,74,.34);

.app-shell{position:relative;z-index:1}
.boot-overlay{background:radial-gradient(circle at 50% 42%,rgba(32,231,255,.08),transparent 34%),#000}
.enter-btn{
  border-color:rgba(217,166,74,.62);

  box-shadow:0 0 34px rgba(217,166,74,.20),0 0 52px rgba(32,231,255,.08);

.boot-logo{
  filter:drop-shadow(0 0 30px rgba(217,166,74,.36)) drop-shadow(0 0 58px rgba(32,231,255,.22)) drop-shadow(0 0 72px rgba(139,92,246,.13));
}
.topbar{
  background:linear-gradient(180deg,rgba(1,3,10,.96),rgba(1,3,10,.74) 74%,transparent);
}
.brand-card,.day-panel,.carousel-wrap,.modal-panel,.utility-dock{
  border-color:rgba(217,166,74,.34);
  background:
    radial-gradient(circle at 50% 0%,rgba(32,231,255,.08),transparent 35%),

  box-shadow:0 22px 80px rgba(0,0,0,.62),inset 0 1px 0 rgba(255,240,173,.08);

.brand-card{
  border-radius:28px;
}
.brand-mark,.icon-btn,.small-btn,.dock-btn,.day-btn,.payload-btn,.model-btn,.x{
  border-color:rgba(217,166,74,.30);

function buildBridgePayload(){

  return {
    app:'ACE Mind',
    version:APP_VERSION,
    source:'ace-mind',

    generated_at:new Date().toISOString(),
    asset_paths:ASSETS,
    day_summary:{weekday:d.weekday,dayNum:d.dayNum,block:d.block,ptrm:d.ptrm,shift:d.shift,focus:g.c.focus,theon:g.c.theon,intensity:g.c.intensity,supplement_mode:g.suppMode},
    convergence:{mayan:mayanLine(d),bazi:baziLine(d),numerology:numerologyLine(d,g),astrology:astrologyLine(d),synthesis:synthesisLine(d,g)},
    body:g.c.body,

    domains:g.life,
    grounding:{frequency:g.freq,breath:g.breath,movement:g.movement,acupressure:g.acu,chakra:g.chakra,food:g.food,mantra:g.mantra},

    instruction:'Use this as source of truth. Return guidance or a valid ace_mind_patch JSON. Do not invent hidden app state.'
  };
}
function bridgeEnvelope(type,payload=null){return{type,ts:Date.now(),source:'ace-mind',version:APP_VERSION,payload};}
function ensureBridgeChannel(){
  if(JesterBridge.channel||!('BroadcastChannel' in window))return JesterBridge.channel;
  try{
    JesterBridge.channel=new BroadcastChannel(JESTER_BRIDGE_CHANNEL);
    JesterBridge.channel.onmessage=(ev)=>{
      const msg=ev.data||{};
      if(!msg||msg.source==='ace-mind')return;
      if(msg.type==='request_state'||msg.type==='JESTER_PING')sendBridgePayload('request');
      if(msg.type==='pong'||msg.type==='alive'||msg.type==='SYNC_ACK'){
        JesterBridge.ready=true;
        JesterBridge.lastAliveAt=Date.now();
      }
    };
  }catch(e){JesterBridge.channel=null;}
  return JesterBridge.channel;
}
function writeBridgeFallback(envelope){try{localStorage.setItem(JESTER_BRIDGE_LS_KEY,JSON.stringify(envelope));}catch(e){}}
function sendBridgePayload(reason='manual'){
  const envelope=bridgeEnvelope('payload',Object.assign({bridge_reason:reason},buildBridgePayload()));
  writeBridgeFallback(envelope);
  const ch=ensureBridgeChannel();
  try{if(ch)ch.postMessage(envelope);}catch(e){}
  JesterBridge.lastSentAt=Date.now();
  return envelope;
}
function openJesterBridge(){
  ensureBridgeChannel();
  let opened=null;
  try{opened=window.open(JESTER_BRIDGE_URL,'jester_bridge');}catch(e){opened=null;}
  if(opened){JesterBridge.tab=opened;try{opened.focus()}catch(e){}}
  const envelope=sendBridgePayload('open_bridge');
  setTimeout(()=>sendBridgePayload('open_bridge_retry'),520);
  toast(opened?'Bridge opened':'Bridge packet prepared');
  return envelope;
}
JesterBridge.notifyStateChanged=function(reason){
  if(!JesterBridge.ready && Date.now()-JesterBridge.lastSentAt<15000)return;
  if(JesterBridge.ready || Date.now()-JesterBridge.lastSentAt>3000)sendBridgePayload(reason||'state_change');
};

async function copyText(text){try{if(navigator.clipboard&&window.isSecureContext!==false){await navigator.clipboard.writeText(text);return true}}catch(e){}try{const ta=document.createElement('textarea');ta.value=text;ta.setAttribute('readonly','');ta.style.position='fixed';ta.style.top='0';ta.style.left='0';ta.style.width='1px';ta.style.height='1px';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);const ok=document.execCommand('copy');ta.remove();if(ok)return true;}catch(e){}try{const box=document.getElementById('handoffBox');if(box){box.value=text;box.focus();box.select();box.setSelectionRange(0,box.value.length)}}catch(e){}return false}

function updateLens(){const d=day(),g=deriveGuidance(d);const lens={app:'ACE Mind',version:APP_VERSION,active_chamber:activeChamber,active_day:d.id,storage_status:storageStatus,asset_paths:ASSETS,data_paths:{app_config:'./shared/data/app-configs/ace-mind.config.json',libraries:'./shared/data/libraries/',profiles:'./shared/data/profiles/',ephemeris:'./shared/data/ephemeris/'},day_summary:{weekday:d.weekday,dayNum:d.dayNum,block:d.block,ptrm:d.ptrm,focus:g.c.focus,theon:g.c.theon,supplement_mode:g.suppMode},body:g.c.body,supplements:g.block.items.map(x=>x[0]),allowed_patch_ops:['set_active_chamber','set_active_day','set_body_status','tick_supplement','set_note','add_log_entry','replace_state_subset','clear_local_state'],instruction:'Use this as source of truth. If asked to modify the app, return only valid JSON patch.'};document.getElementById('lensPre').textContent=JSON.stringify(lens,null,2);document.getElementById('agent-state').textContent=JSON.stringify(lens)}

function validatePatch(p){if(!p||p.patch_type!=='ace_mind_patch'||!Array.isArray(p.ops))throw new Error('Invalid patch');const allowed=['set_active_chamber','set_active_day','set_body_status','tick_supplement','set_note','add_log_entry','replace_state_subset','clear_local_state'];p.ops.forEach(op=>{if(!allowed.includes(op.op))throw new Error('Blocked op: '+op.op)})}

function applyOp(op){const d=op.data||{};if(op.op==='set_active_chamber')setChamber(d.chamber||'spades',false);if(op.op==='set_active_day')activeIdx=validIndex(d.index??ANCHORS.findIndex(x=>x.id===d.date));if(op.op==='set_body_status')setBody(d.date||day().id,d.axis,d.status||'green');if(op.op==='tick_supplement')state.supp[key(d.date||day().id,d.name)]=!!d.value;if(op.op==='set_note')state.notes[d.date||day().id]=String(d.note||'');if(op.op==='add_log_entry')state.logs.push(Object.assign({at:new Date().toISOString()},d));if(op.op==='replace_state_subset')state=mergeState(state,d);if(op.op==='clear_local_state'){storageRemove(STORAGE_KEY);OLD_STORAGE_KEYS.forEach(storageRemove);state=initialState();activeIdx=state.activeIdx;activeChamber=state.activeChamber;storageStatus={mode:'cleared',lastError:null,lastSavedAt:null}}}
