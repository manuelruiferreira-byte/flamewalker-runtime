<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover" />
<meta name="theme-color" content="#02040a" />
<title>ACE Prism</title>
<style>
html,body{margin:0;width:100%;height:100%;background:#000;color:#fff5d6;font-family:Inter,system-ui,sans-serif;overflow:hidden}.boot{position:fixed;inset:0;display:grid;place-items:center;background:#000}.boot img{width:min(78vw,430px);border-radius:32px;box-shadow:0 0 80px rgba(32,231,255,.18),0 0 80px rgba(255,79,216,.14)}.msg{max-width:86vw;text-align:center;line-height:1.5;color:#d7e2ef}
</style>
</head>
<body>
<div class="boot" id="boot"><img src="../ACE-Prism-App/ace-prism-user-logo.svg" alt="ACE Prism" /></div>
<script>
(async function(){
  try{
    const url='./ace-prism-runtime-v1-1-0.html?v=1.1.2';
    const response=await fetch(url,{cache:'no-store'});
    if(!response.ok)throw new Error('runtime '+response.status);
    let html=await response.text();
    html=html.replace(/let out=JSON\.stringify\(packet,null,2\);if\(out\.length>38000\)out=out\.slice\(0,37800\)\+'\s*\/\* payload truncated \*\/';return out/,"let out=JSON.stringify(packet,null,2);if(out.length>38000)out=out.slice(0,37800)+'\\n/* payload truncated */';return out");
    html=html.replaceAll('../ACE-Prism-App/ace-prism-512.png','../ACE-Prism-App/ace-prism-user-logo.svg');
    html=html.replaceAll('1.1.0','1.1.2');
    document.open();document.write(html);document.close();
  }catch(error){
    document.body.innerHTML='<div class="boot"><div class="msg"><b>ACE Prism could not start.</b><br>'+String(error.message||error)+'</div></div>';
    console.error(error);
  }
})();
</script>
</body>
</html>
