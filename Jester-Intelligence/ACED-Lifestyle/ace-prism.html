<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5,user-scalable=yes,viewport-fit=cover" />
<meta name="theme-color" content="#02040a" />
<title>ACE Prism</title>
<link rel="manifest" href="../ACE-Prism-App/manifest.webmanifest" />
<meta name="mobile-web-app-capable" content="yes" />
<style>
:root{
  --bg:#01030a;--panel:rgba(5,12,26,.88);--panel2:rgba(8,18,36,.76);
  --gold:#d9a64a;--gold2:#fff0ad;--cyan:#20e7ff;--violet:#9b5cff;
  --magenta:#ff4fd8;--rose:#ff6f91;--emerald:#39e6a7;--red:#ff5f72;
  --text:#fff5d6;--muted:#a7b7ca;--line:rgba(217,166,74,.30);
  --shadow:0 26px 90px rgba(0,0,0,.68),0 0 42px rgba(32,231,255,.05);
  --ease:cubic-bezier(.22,1,.36,1)
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:pan-x pan-y pinch-zoom}
body{overflow-x:hidden;background:
 radial-gradient(circle at 50% -10%,rgba(32,231,255,.20),transparent 30%),
 radial-gradient(circle at 84% 8%,rgba(255,79,216,.15),transparent 30%),
 radial-gradient(circle at 16% 10%,rgba(155,92,255,.15),transparent 28%),
 radial-gradient(circle at 50% 70%,rgba(217,166,74,.08),transparent 42%),
 linear-gradient(180deg,#01030a 0%,#061224 48%,#02050d 100%)}
button,input,textarea,select{font:inherit;color:inherit}
button{border:0;cursor:pointer}
input[type=file]{display:none}
.hidden{display:none!important}
.app-shell{min-height:100svh;padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
.splash{position:fixed;inset:0;z-index:500;display:grid;place-items:center;background:#000;transition:opacity .7s var(--ease),visibility .7s}
.splash.off{opacity:0;visibility:hidden;pointer-events:none}
.splash img{width:min(74vw,410px);border-radius:34px;box-shadow:0 0 80px rgba(32,231,255,.15),0 0 80px rgba(255,79,216,.12);animation:splashPulse 2.4s ease-in-out infinite}
@keyframes splashPulse{50%{transform:scale(1.025);filter:brightness(1.12)}}
.topbar{position:sticky;top:0;z-index:40;padding:14px 14px 8px;background:linear-gradient(180deg,rgba(1,3,10,.97),rgba(1,3,10,.70) 74%,transparent);backdrop-filter:blur(18px)}
.brand-card{max-width:1120px;margin:0 auto;border:1px solid var(--line);border-radius:28px;background:
 radial-gradient(circle at 12% 0%,rgba(32,231,255,.09),transparent 34%),
 radial-gradient(circle at 88% 0%,rgba(255,79,216,.08),transparent 34%),
 linear-gradient(145deg,rgba(5,16,36,.90),rgba(1,4,12,.74));box-shadow:var(--shadow);padding:12px;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}
.brand-mark{width:58px;height:58px;border-radius:19px;border:1px solid rgba(217,166,74,.38);background:#000;overflow:hidden;box-shadow:inset 0 0 28px rgba(217,166,74,.08),0 0 22px rgba(32,231,255,.08)}
.brand-mark img{width:100%;height:100%;object-fit:cover;display:block}
.title{font-family:Georgia,serif;font-size:1.14rem;font-weight:900;letter-spacing:.10em;color:var(--gold2);white-space:nowrap}
.top-actions{display:flex;gap:8px}
.icon-btn{width:44px;height:44px;border:1px solid rgba(217,166,74,.30);border-radius:16px;background:rgba(4,12,26,.84);display:grid;place-items:center;color:var(--gold2);font-size:1.15rem}
.main{max-width:1120px;margin:0 auto;padding:10px 12px 104px}
.carousel-wrap{position:relative;border:1px solid var(--line);border-radius:34px;background:linear-gradient(180deg,rgba(6,17,36,.78),rgba(2,6,14,.78));box-shadow:var(--shadow);overflow:hidden}
.carousel-wrap:before{content:"";position:absolute;inset:0;background:
 radial-gradient(circle at 50% 0%,rgba(217,166,74,.12),transparent 34%),
 radial-gradient(circle at 18% 18%,rgba(32,231,255,.10),transparent 30%),
 radial-gradient(circle at 90% 18%,rgba(255,79,216,.10),transparent 30%);pointer-events:none}
.carousel-track{position:relative;display:flex;transform:translateX(-100%);will-change:transform;touch-action:pan-x pan-y pinch-zoom}
.carousel-track.moving{transition:transform 520ms var(--ease)}
.chamber{min-width:100%;padding:12px;min-height:calc(100svh - 220px);display:flex}
.chamber-inner{position:relative;width:100%;border:1px solid rgba(217,166,74,.22);border-radius:28px;background:linear-gradient(145deg,rgba(3,12,28,.76),rgba(6,17,36,.84));overflow:hidden;padding:14px;display:grid;grid-template-rows:auto 1fr;gap:12px}
.chamber-head{display:flex;align-items:center;gap:12px;min-height:54px}
.suit{width:52px;height:52px;border-radius:18px;border:1px solid rgba(217,166,74,.42);display:grid;place-items:center;background:rgba(0,0,0,.28);box-shadow:inset 0 0 26px rgba(217,166,74,.10),0 0 26px rgba(32,231,255,.08)}
.suit svg{width:30px;height:30px;stroke:var(--gold2);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.chamber-title{font-family:Georgia,serif;font-size:1.18rem;font-weight:900;letter-spacing:.08em;color:#fff7dc}
.chamber-grid{display:grid;gap:12px;align-content:start}
.card{border:1px solid rgba(217,166,74,.24);border-radius:22px;background:
 radial-gradient(circle at 50% 0%,rgba(32,231,255,.045),transparent 34%),
 linear-gradient(145deg,rgba(3,11,27,.82),rgba(1,5,14,.72));box-shadow:0 14px 42px rgba(0,0,0,.30);padding:14px;overflow:hidden}
.card-title{font-size:1rem;font-weight:900;color:#fff8df;line-height:1.25}
.row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;border-top:1px solid rgba(255,255,255,.07);padding:10px 0}
.row:first-child{border-top:0}
.row-title{font-size:.94rem;font-weight:850;color:#fff8df;line-height:1.25}
.meta{font-size:.82rem;color:var(--muted);line-height:1.42;margin-top:4px}
.grid-2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
.field{display:grid;gap:6px;margin-top:10px}
.field:first-child{margin-top:0}
.field label{font-size:.80rem;font-weight:850;color:#b9c8ff;letter-spacing:.06em;text-transform:uppercase}
input,textarea,select{width:100%;border:1px solid rgba(217,166,74,.22);background:rgba(0,0,0,.32);border-radius:16px;padding:12px;outline:none}
textarea{min-height:150px;resize:vertical;line-height:1.55}
input:focus,textarea:focus,select:focus{border-color:rgba(32,231,255,.66);box-shadow:0 0 0 2px rgba(32,231,255,.10)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.btn{min-height:44px;border:1px solid rgba(217,166,74,.26);border-radius:15px;background:rgba(5,12,26,.84);padding:10px 14px;color:#e8edf7;font-weight:780}
.btn.primary{border-color:rgba(217,166,74,.58);background:linear-gradient(135deg,rgba(217,166,74,.22),rgba(32,231,255,.08));color:var(--gold2)}
.btn.cyan{border-color:rgba(32,231,255,.48);color:#b9fbff}
.btn.violet{border-color:rgba(155,92,255,.48);color:#e2d5ff}
.btn.green{border-color:rgba(57,230,167,.48);color:#bff9df}
.btn.red{border-color:rgba(255,95,114,.48);color:#ffd1d8}
.pill{display:inline-grid;place-items:center;border:1px solid rgba(255,255,255,.13);border-radius:999px;padding:6px 9px;font-size:.78rem;font-weight:850;color:var(--gold2);background:rgba(217,166,74,.08)}
.pill.active{color:#bff9df;border-color:rgba(57,230,167,.44);background:rgba(57,230,167,.09)}
.list{display:grid;gap:8px;margin-top:10px}
.item{border:1px solid rgba(255,255,255,.08);border-radius:17px;background:rgba(255,255,255,.025);padding:10px}
.item.selected{border-color:rgba(32,231,255,.58);box-shadow:0 0 18px rgba(32,231,255,.08)}
.item-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px}
.item-actions .btn{min-height:38px;padding:7px 10px}
.context-strip{display:flex;gap:7px;flex-wrap:wrap;align-items:center}
.empty{padding:18px;text-align:center;color:var(--muted);font-size:.90rem}
.gallery{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}
.image-card{border:1px solid rgba(217,166,74,.20);border-radius:18px;overflow:hidden;background:rgba(0,0,0,.24)}
.image-card img{display:block;width:100%;aspect-ratio:1/1;object-fit:cover}
.image-card .body{padding:10px}
.video-preview{white-space:pre-wrap;border:1px solid rgba(32,231,255,.20);border-radius:16px;background:rgba(0,0,0,.28);padding:12px;line-height:1.55;color:#dff9ff}
.score-ring{width:112px;height:112px;border-radius:50%;display:grid;place-items:center;margin:4px auto 12px;background:conic-gradient(var(--cyan) var(--score),rgba(255,255,255,.08) 0);position:relative}
.score-ring:after{content:"";position:absolute;inset:10px;border-radius:50%;background:#06101e}
.score-ring b{position:relative;z-index:2;font-size:1.65rem;color:var(--gold2)}
.align-posture{text-align:center;font-family:Georgia,serif;font-size:1.22rem;font-weight:900;color:#fff8df}
.utility-dock{position:fixed;left:50%;bottom:10px;z-index:70;transform:translateX(-50%);width:min(94vw,760px);border:1px solid rgba(217,166,74,.28);border-radius:24px;background:rgba(2,4,10,.86);backdrop-filter:blur(18px);box-shadow:var(--shadow);padding:8px;display:grid;grid-template-columns:repeat(5,1fr);gap:7px}
.dock-btn{min-height:52px;border:1px solid rgba(217,166,74,.24);border-radius:16px;background:rgba(6,17,36,.80);display:grid;place-items:center;color:var(--muted)}
.dock-btn.active{border-color:rgba(217,166,74,.70);color:var(--gold2);background:linear-gradient(135deg,rgba(217,166,74,.17),rgba(32,231,255,.08),rgba(255,79,216,.06))}
.dock-btn svg{width:26px;height:26px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.modal{position:fixed;inset:0;z-index:160;display:none;place-items:end center;background:rgba(0,0,0,.64);backdrop-filter:blur(11px);padding:12px}
.modal.open{display:grid}
.modal-panel{width:min(960px,100%);max-height:90svh;overflow:auto;border:1px solid rgba(217,166,74,.34);border-radius:28px;background:linear-gradient(180deg,rgba(7,18,36,.98),rgba(2,4,10,.98));box-shadow:var(--shadow);padding:15px}
.modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
.modal-title{font-family:Georgia,serif;font-size:1.08rem;font-weight:900;color:var(--gold2)}
.x{width:40px;height:40px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(217,166,74,.22)}
.model-grid,.payload-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
.model-btn,.payload-btn{min-height:44px;border:1px solid rgba(155,92,255,.30);border-radius:14px;background:rgba(4,12,26,.74);color:#d9ccff;text-decoration:none;display:grid;place-items:center;font-weight:750}
.payload-btn.active{border-color:rgba(32,231,255,.70);color:#b9fbff;background:rgba(32,231,255,.08)}
.codebox{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;font-size:.82rem;line-height:1.5}
.handoff-gate{position:fixed;inset:0;z-index:260;display:none;place-items:center;background:#000}
.handoff-gate.open{display:grid}
.handoff-card{width:min(82vw,420px);min-height:260px;border:1px solid rgba(217,166,74,.36);border-radius:34px;background:linear-gradient(145deg,rgba(7,18,36,.96),rgba(2,4,10,.98));display:grid;place-items:center;text-align:center;padding:34px;animation:handoff .6s var(--ease)}
.handoff-mark{width:94px;height:94px;border-radius:30px;border:1px solid rgba(217,166,74,.42);display:grid;place-items:center;margin:0 auto 16px;background:radial-gradient(circle at 50% 35%,rgba(217,166,74,.20),rgba(32,231,255,.08));color:var(--gold2);font-size:1.18rem;font-weight:900}
@keyframes handoff{from{opacity:0;transform:scale(.96);filter:blur(10px)}to{opacity:1;transform:scale(1);filter:blur(0)}}
.toast{position:fixed;left:50%;top:18px;transform:translateX(-50%) translateY(-18px);opacity:0;z-index:400;background:rgba(2,4,10,.96);border:1px solid rgba(217,166,74,.36);border-radius:18px;padding:12px 14px;box-shadow:var(--shadow);transition:.25s;color:var(--gold2);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:760px){
 .brand-card{grid-template-columns:auto 1fr auto;padding:10px}.brand-mark{width:52px;height:52px}.title{font-size:1rem}
 .main{padding:8px 8px 96px}.chamber{padding:8px;min-height:calc(100svh - 205px)}.chamber-inner{padding:11px;border-radius:24px}
 .grid-2,.grid-3,.gallery,.model-grid,.payload-grid{grid-template-columns:1fr}
 .card{border-radius:19px;padding:12px}.utility-dock{bottom:8px}.dock-btn{min-height:48px}
}

/* ACE Prism v1.1 creative tools. Hidden until summoned, preserving the clean shell. */
.tool-row{display:flex;gap:7px;flex-wrap:wrap;margin-top:9px}
.tool-btn{min-height:38px;border:1px solid rgba(155,92,255,.30);border-radius:13px;background:rgba(155,92,255,.07);padding:7px 10px;color:#e5d8ff;font-size:.78rem;font-weight:800}
.tool-btn.cyan{border-color:rgba(32,231,255,.32);background:rgba(32,231,255,.06);color:#c8faff}
.tool-btn.gold{border-color:rgba(217,166,74,.38);background:rgba(217,166,74,.07);color:var(--gold2)}
.tool-tabs,.mini-tabs{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding:2px 0 8px}.tool-tabs::-webkit-scrollbar,.mini-tabs::-webkit-scrollbar{display:none}
.tool-tab,.mini-tab{flex:0 0 auto;border:1px solid rgba(217,166,74,.20);border-radius:13px;background:rgba(255,255,255,.03);padding:9px 11px;color:var(--muted);font-size:.76rem;font-weight:800}
.tool-tab.active,.mini-tab.active{border-color:rgba(32,231,255,.62);background:linear-gradient(135deg,rgba(32,231,255,.10),rgba(155,92,255,.09));color:#e9fcff}
.word-results{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px;margin-top:10px}
.word-result{border:1px solid rgba(255,255,255,.09);border-radius:14px;background:rgba(255,255,255,.025);padding:9px;display:grid;grid-template-columns:1fr auto;gap:7px;align-items:center}
.word-main{min-width:0}.word-name{font-weight:900;color:#fff8df;word-break:break-word}.word-meta{font-size:.70rem;color:var(--muted);margin-top:2px;line-height:1.3}
.word-actions{display:flex;gap:5px}.word-actions button{width:34px;height:34px;border-radius:11px;border:1px solid rgba(217,166,74,.22);background:rgba(0,0,0,.25);color:var(--gold2)}
.metric-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.metric{border:1px solid rgba(255,255,255,.08);border-radius:15px;background:rgba(255,255,255,.025);padding:10px;text-align:center}.metric b{display:block;font-size:1.15rem;color:var(--gold2)}.metric span{font-size:.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.line-map{display:grid;gap:6px;margin-top:10px}.line-map-row{display:grid;grid-template-columns:34px 1fr auto;gap:8px;align-items:start;border-top:1px solid rgba(255,255,255,.06);padding-top:7px;font-size:.80rem}.line-map-row:first-child{border-top:0}.line-map-row b{color:var(--cyan)}
.voice-chips,.palette-chips,.bible-filters{display:flex;gap:7px;flex-wrap:wrap}.voice-chip,.palette-chip,.bible-filter{border:1px solid rgba(255,255,255,.10);border-radius:999px;background:rgba(255,255,255,.03);padding:7px 10px;color:var(--muted);font-size:.76rem;font-weight:800}.voice-chip.active,.bible-filter.active{border-color:rgba(255,79,216,.52);background:rgba(255,79,216,.09);color:#ffd6f5}.palette-chip{color:#dce8f5}
.palette-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:10px}.palette-box{border:1px solid rgba(255,255,255,.08);border-radius:15px;background:rgba(255,255,255,.025);padding:10px}.palette-box b{display:block;color:var(--gold2);font-size:.74rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}.palette-box div{font-size:.82rem;color:#d8e2ef;line-height:1.45}
.bible-entry,.version-entry,.saved-word{border:1px solid rgba(255,255,255,.08);border-radius:16px;background:rgba(255,255,255,.025);padding:10px;margin-top:8px}.bible-entry.selected,.version-entry.selected{border-color:rgba(32,231,255,.55)}
.entry-top{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:start}.entry-type{font-size:.68rem;color:var(--cyan);text-transform:uppercase;letter-spacing:.10em;font-weight:900}.entry-title{font-weight:900;color:#fff8df;margin-top:2px}.entry-body{font-size:.80rem;color:#b9c8da;line-height:1.45;margin-top:5px;white-space:pre-wrap}.entry-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.external-links{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;margin-top:10px}.external-links a{flex:0 0 auto;border:1px solid rgba(32,231,255,.22);border-radius:12px;background:rgba(32,231,255,.05);padding:8px 10px;color:#c8faff;text-decoration:none;font-size:.75rem;font-weight:800}
.tool-note{font-size:.76rem;color:var(--muted);line-height:1.45;margin-top:8px}
.hidden-agent-detail{position:absolute!important;width:1px!important;height:1px!important;overflow:hidden!important;clip:rect(0,0,0,0)!important;white-space:nowrap!important}
@media(max-width:760px){.word-results,.palette-grid,.metric-grid{grid-template-columns:1fr}.tool-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr))}.tool-btn{width:100%}}

</style>
</head>
<body>
<div class="splash" id="splash"><img src="../ACE-Prism-App/ace-prism-512.png" alt="ACE Prism" /></div>
<div class="app-shell" id="appShell">
  <header class="topbar">
    <div class="brand-card">
      <div class="brand-mark"><img src="../ACE-Prism-App/ace-prism-512.png" alt="ACE Prism" /></div>
      <div class="title">ACE PRISM</div>
      <div class="top-actions">
        <button class="icon-btn" onclick="openAI()" aria-label="Ask AI">✦</button>
        <button class="icon-btn" onclick="openData()" aria-label="Data">⋮</button>
      </div>
    </div>
  </header>
  <main class="main">
    <div class="carousel-wrap" id="carouselWrap">
      <div class="carousel-track" id="carouselTrack"></div>
    </div>
  </main>
  <nav class="utility-dock" id="dock"></nav>
</div>

<div class="modal" id="aiModal"><div class="modal-panel">
  <div class="modal-head"><div class="modal-title">Prism AI</div><button class="x" onclick="closeModal('aiModal')">×</button></div>
  <div class="payload-grid" id="payloadGrid"></div>
  <div class="field"><label>Packet</label><textarea class="codebox" id="aiPayload" readonly></textarea></div>
  <div class="model-grid" id="modelGrid"></div>
  <div class="btn-row"><button class="btn cyan" onclick="copyCurrentPayload()">Copy</button><button class="btn violet" onclick="sendScholarPacket()">Scholar</button><button class="btn primary" onclick="emitLifestyleFlag()">Lifestyle</button></div>
</div></div>

<div class="modal" id="patchModal"><div class="modal-panel">
  <div class="modal-head"><div class="modal-title">Patch Console</div><button class="x" onclick="closeModal('patchModal')">×</button></div>
  <div class="field"><label>Patch JSON</label><textarea class="codebox" id="patchInput" placeholder='{"patch_type":"ace_prism_patch","version":"1.0","reason":"Update one object","ops":[]}'></textarea></div>
  <div class="btn-row"><button class="btn cyan" onclick="previewPatch()">Preview</button><button class="btn green" onclick="applyPatch()">Apply</button><button class="btn violet" onclick="rollbackPatch()">Rollback</button></div>
  <div class="field"><label>Result</label><textarea class="codebox" id="patchOutput" readonly></textarea></div>
</div></div>

<div class="modal" id="dataModal"><div class="modal-panel">
  <div class="modal-head"><div class="modal-title">Prism Data</div><button class="x" onclick="closeModal('dataModal')">×</button></div>
  <div class="grid-2">
    <div class="card"><div class="card-title">Backup</div><div class="btn-row"><button class="btn primary" onclick="exportBackup()">Export</button><label class="btn cyan" for="backupInput">Import</label><input id="backupInput" type="file" accept=".json,application/json" onchange="importBackup(event)" /></div></div>
    <div class="card"><div class="card-title">Routes</div><div class="btn-row"><button class="btn" onclick="location.href='./index.html'">Lifestyle</button><button class="btn" onclick="location.href='./ace-scholar.html'">Scholar</button><button class="btn violet" onclick="openPatch()">Patch</button></div></div>
  </div>
  <div class="card"><div class="card-title">Storage</div><div class="meta" id="storageStatus">Checking…</div><div class="btn-row"><button class="btn cyan" onclick="runLegacyMigration(true)">Legacy Import</button><button class="btn red" onclick="clearAllData()">Clear</button></div></div>
</div></div>


<div class="modal" id="forgeModal"><div class="modal-panel">
  <div class="modal-head"><div class="modal-title">Creative Lens</div><button class="x" onclick="closeModal('forgeModal')">×</button></div>
  <div class="tool-tabs" id="forgeTabs"></div>
  <div id="forgeBody"></div>
</div></div>

<div class="modal" id="bibleModal"><div class="modal-panel">
  <div class="modal-head"><div class="modal-title" id="bibleTitle">Continuity Bible</div><button class="x" onclick="closeModal('bibleModal')">×</button></div>
  <div class="bible-filters" id="bibleFilters"></div>

function analyzeRhythm(text){

 const rhymeGroups={};rows.forEach(r=>{if(r.key.length>=2)(rhymeGroups[r.key]||(rhymeGroups[r.key]=[])).push(r.i)});

 const repeated={};wordsOf(text).forEach(w=>{if(w.length>3)repeated[w]=(repeated[w]||0)+1});

 return{lines:rows.length,avg:+avg.toFixed(1),range,rows,rhymes,repeats,alliteration:[...new Set(rows.flatMap(r=>r.alliteration))]}
}

async function runWordForge(mode){

 try{const p=new URLSearchParams({max:'24',md:'dpsr'}),w=forgeWord;if(forgeMode==='rhyme')p.set('rel_rhy',w);else if(forgeMode==='near')p.set('rel_nry',w);else if(forgeMode==='syn')p.set('rel_syn',w);else if(forgeMode==='ant')p.set('rel_ant',w);else if(forgeMode==='meaning')p.set('ml',w);else if(forgeMode==='sound')p.set('sl',w);else if(forgeMode==='alliteration')p.set('rel_cns',w);else if(forgeMode==='followers')p.set('rel_bga',w);else if(forgeMode==='predecessors')p.set('rel_bgb',w);else if(forgeMode==='adjectives')p.set('rel_jjb',w);else if(forgeMode==='nouns')p.set('rel_jja',w);else{p.set('sp',w);p.set('qe','sp');p.set('max','1')}
  const res=await fetch('https://api.datamuse.com/words?'+p.toString(),{cache:'no-store'});if(!res.ok)throw new Error('Word service '+res.status);forgeResults=await res.json();
 }catch(e){forgeResults=[];toast('Word service unavailable')}
 forgeBusy=false;renderWordForge()
}

function updateAgentState(){$('agent-state').textContent=JSON.stringify(snapshot(),null,2)}
async function updateStorageStatus(){if(!$('storageStatus'))return;let sizes={};for(const s of STORES)sizes[s]=cache[s].length;let estimate='unknown';if(navigator.storage&&navigator.storage.estimate){const e=await navigator.storage.estimate();estimate=((e.usage||0)/1048576).toFixed(1)+' MB / '+((e.quota||0)/1048576).toFixed(0)+' MB'}$('storageStatus').textContent='IndexedDB · '+estimate+' · '+Object.entries(sizes).map(([k,v])=>k+' '+v).join(' · ')}

async function removeRecord(name,id){if(!confirm('Delete this item?'))return;await deleteOne(name,id);if(name==='sources')session.activeSourceIds=(session.activeSourceIds||[]).filter(x=>x!==id);if(name==='books'&&session.activeBookId===id)session.activeBookId=null;if(name==='chapters'&&session.editingChapterId===id)session.editingChapterId=null;if(name==='poems'&&session.editingPoemId===id)session.editingPoemId=null;if(name==='images'&&session.activeImageId===id)session.activeImageId=null;if(name==='videoPrompts'&&session.editingVideoId===id)session.editingVideoId=null;if(name==='books'){for(const e of cache.bibleEntries.filter(x=>x.bookId===id))await deleteOne('bibleEntries',e.id)}if(name==='chapters'||name==='poems'){for(const v of cache.versions.filter(x=>x.entityKey===entityKey(name==='chapters'?'chapter':'poem',id)))await deleteOne('versions',v.id)}await persistAndRender();toast('Deleted')}

function patchAllowed(op){return manifest().allowed_patch_ops.includes(op.op)}
async function buildRollback(){const data={};for(const s of ['sources','books','chapters','poems','videoPrompts','bibleEntries','versions','wordSaves'])data[s]=await getAll(s);return{at:now(),session:JSON.parse(JSON.stringify(session)),data}}
function validatePatchObject(p){if(!p||p.patch_type!=='ace_prism_patch'||p.version!=='1.0'||!Array.isArray(p.ops))throw new Error('Invalid ace_prism_patch');for(const op of p.ops)if(!patchAllowed(op))throw new Error('Unsupported op '+op.op);return p}
function previewPatch(){try{const p=validatePatchObject(JSON.parse($('patchInput').value));patchPreview=p;$('patchOutput').value=JSON.stringify({status:'PREVIEW',reason:p.reason||'',ops:p.ops.map(x=>({op:x.op,id:x.id||x.value&&x.value.id||null,store:x.store||null}))},null,2)}catch(e){$('patchOutput').value='ERROR: '+e.message}}
async function applyPatch(){try{const p=patchPreview||validatePatchObject(JSON.parse($('patchInput').value));session.patchRollback=await buildRollback();for(const op of p.ops){if(op.op==='set_active_chamber'){const i=CHAMBERS.indexOf(op.value);if(i>=0)activeIndex=i}else if(op.op==='set_setting'){session.settings[op.key]=op.value}else if(op.op==='delete_record'){if(!STORES.includes(op.store))throw new Error('Bad store');await deleteOne(op.store,op.id)}else{const map={upsert_source:'sources',upsert_book:'books',upsert_chapter:'chapters',upsert_poem:'poems',upsert_video_prompt:'videoPrompts',upsert_bible_entry:'bibleEntries'},st=map[op.op];const v=Object.assign({},op.value||{});v.id=v.id||uid(st);v.createdAt=v.createdAt||now();v.updatedAt=now();await putOne(st,v)}}patchPreview=null;await persistAndRender();$('patchOutput').value=JSON.stringify({status:'APPLIED',rollback:true},null,2);toast('Patch applied')}catch(e){$('patchOutput').value='ERROR: '+e.message}}
async function rollbackPatch(){const r=session.patchRollback;if(!r){toast('No rollback');return}for(const s of Object.keys(r.data)){await clearStore(s);for(const x of r.data[s])await putOne(s,x)}session=Object.assign(initialSession(),r.session,{patchRollback:null});activeIndex=CHAMBERS.indexOf(session.activeChamber);await persistAndRender();$('patchOutput').value=JSON.stringify({status:'ROLLED_BACK'},null,2);toast('Rolled back')}

function blobToDataURL(blob){return new Promise((resolve,reject)=>{const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=()=>reject(r.error);r.readAsDataURL(blob)})}
function dataURLToBlob(data){const [head,b64]=data.split(','),mime=(head.match(/data:([^;]+)/)||[])[1]||'application/octet-stream',bin=atob(b64),arr=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)arr[i]=bin.charCodeAt(i);return new Blob([arr],{type:mime})}
async function exportBackup(){const data={};for(const s of STORES){data[s]=await getAll(s);if(s==='images'){data[s]=await Promise.all(data[s].map(async x=>Object.assign({},x,{blobData:x.blob?await blobToDataURL(x.blob):null,blob:undefined})))}}const payload={packet_type:'ace_prism_backup',version:APP_VERSION,exported_at:now(),session,data};download(new Blob([JSON.stringify(payload,null,2)],{type:'application/json'}),'ace-prism-backup-'+brusselsDate()+'.json');toast('Backup exported')}
async function importBackup(ev){const f=ev.target.files&&ev.target.files[0];if(!f)return;try{const p=JSON.parse(await f.text());if(p.packet_type!=='ace_prism_backup'||!p.data)throw new Error('Not an ACE Prism backup');if(!confirm('Replace Prism data with this backup?'))return;for(const s of STORES){await clearStore(s);for(const item of p.data[s]||[]){const x=Object.assign({},item);if(s==='images'&&x.blobData){x.blob=dataURLToBlob(x.blobData);delete x.blobData}await putOne(s,x)}}session=Object.assign(initialSession(),p.session||{});activeIndex=Math.max(0,CHAMBERS.indexOf(session.activeChamber));await persistAndRender();toast('Backup imported')}catch(e){alert('Import failed: '+e.message)}finally{ev.target.value=''}}

async function clearAllData(){if(prompt('Type CLEAR to erase Prism data')!=='CLEAR')return;for(const s of STORES)await clearStore(s);await clearStore('meta');session=initialSession();activeIndex=0;await seedDefaults();await persistAndRender();toast('Prism cleared')}

async function runLegacyMigration(force=false){
 const marker=await getMeta('legacy_migrated');if(marker&&!force){return}
 const raw=localStorage.getItem(LEGACY_KEY);if(!raw){await setMeta('legacy_migrated',{status:'none',at:now()});if(force)toast('No legacy state');return}
 try{
  const old=JSON.parse(raw),projects=Array.isArray(old.projects)?old.projects:[],pmap=new Map(projects.map(p=>[p.id,p]));
  const bookMap=new Map();
  for(const p of projects.filter(p=>p.type==='book')){const b={id:'legacy_'+p.id,title:p.name,premise:p.note||'',createdAt:now(),updatedAt:now()};await putOne('books',b);bookMap.set(p.id,b.id)}
  for(const f of old.fragments||[]){await putOne('sources',{id:'legacy_'+f.id,title:(pmap.get(f.projectId)?.name||'Legacy')+' · '+(f.type||'fragment'),content:f.text||'',type:'legacy',tags:f.symbols||[],createdAt:f.createdAt||now(),updatedAt:f.createdAt||now()})}
  for(const c of old.bookChapters||[]){const bid=bookMap.get(c.projectId)||'legacy_'+c.projectId;if(!await getOne('books',bid))await putOne('books',{id:bid,title:pmap.get(c.projectId)?.name||c.projectId||'Legacy Book',premise:'',createdAt:now(),updatedAt:now()});await putOne('chapters',{id:'legacy_'+c.id,bookId:bid,title:c.title||'Chapter',body:c.description||c.text||'',status:c.status||'draft',sourceIds:[],createdAt:c.createdAt||now(),updatedAt:c.updatedAt||c.createdAt||now()})}
  for(const p of old.pieces||[]){const proj=pmap.get(p.projectId),txt=p.text||p.body||p.content||'';if(proj&&proj.type==='book'){const bid=bookMap.get(p.projectId)||'legacy_'+p.projectId;await putOne('chapters',{id:'legacy_piece_'+p.id,bookId:bid,title:p.title||'Chapter',body:txt,status:p.status||'draft',sourceIds:[],createdAt:p.createdAt||now(),updatedAt:p.updatedAt||p.createdAt||now()})}else await putOne('poems',{id:'legacy_'+p.id,title:p.title||proj?.name||'Legacy Piece',body:txt,status:p.status||'draft',tags:p.tags||[],sourceIds:[],createdAt:p.createdAt||now(),updatedAt:p.updatedAt||p.createdAt||now()})}
  for(const v of old.videoPrompts||[]){await putOne('videoPrompts',{id:'legacy_'+v.id,title:v.title||v.purpose||'Legacy Video',style:'cinematic',camera:'Eye level',movement:'Slow push-in',focus:'Shallow depth of field',lens:'35mm cinematic',light:'Neon contrast',format:'16:9 · 10s',scene:v.scene||'',prompt:v.prompt||'',imageId:null,sourceIds:[],createdAt:v.createdAt||now(),updatedAt:v.createdAt||now()})}
  for(const sc of old.storyboardScenes||[]){await putOne('videoPrompts',{id:'legacy_scene_'+sc.id,title:sc.title||'Legacy Scene',style:'cinematic',camera:'Eye level',movement:'Slow push-in',focus:'Deep focus',lens:'35mm cinematic',light:'Chiaroscuro',format:'16:9 · 10s',scene:[sc.still,sc.video,sc.audio,sc.continuity].filter(Boolean).join('\n'),prompt:sc.video||sc.still||'',imageId:null,sourceIds:[],createdAt:sc.createdAt||now(),updatedAt:sc.createdAt||now()})}
  await setMeta('legacy_migrated',{status:'imported',at:now()});await refreshCache();if(!session.activeSourceIds.length)session.activeSourceIds=cache.sources.slice(0,3).map(x=>x.id);if(!session.activeBookId&&cache.books[0])session.activeBookId=cache.books[0].id;await saveSession();if(force){renderCarousel();toast('Legacy imported')}
 }catch(e){await setMeta('legacy_migrated',{status:'error',message:e.message,at:now()});if(force)alert('Legacy import failed: '+e.message)}
}

function utf8Bytes(s){return new TextEncoder().encode(String(s))}
function writeU16(a,n){a.push(n&255,(n>>>8)&255)}
function writeU32(a,n){a.push(n&255,(n>>>8)&255,(n>>>16)&255,(n>>>24)&255)}
function crc32Bytes(bytes){let c=0xffffffff;for(let i=0;i<bytes.length;i++){c^=bytes[i];for(let k=0;k<8;k++)c=(c>>>1)^((c&1)?0xedb88320:0)}return(c^0xffffffff)>>>0}
function dosDateTime(d){let y=Math.max(1980,d.getFullYear());return{dosTime:(d.getHours()<<11)|(d.getMinutes()<<5)|(d.getSeconds()>>1),dosDate:((y-1980)<<9)|((d.getMonth()+1)<<5)|d.getDate()}}
function makeZip(files){const chunks=[],central=[];let offset=0;const dt=dosDateTime(new Date());files.forEach(f=>{const nb=utf8Bytes(f.name),dbb=utf8Bytes(f.content),crc=crc32Bytes(dbb),local=[];writeU32(local,0x04034b50);writeU16(local,20);writeU16(local,0);writeU16(local,0);writeU16(local,dt.dosTime);writeU16(local,dt.dosDate);writeU32(local,crc);writeU32(local,dbb.length);writeU32(local,dbb.length);writeU16(local,nb.length);writeU16(local,0);chunks.push(new Uint8Array(local),nb,dbb);const cen=[];writeU32(cen,0x02014b50);writeU16(cen,20);writeU16(cen,20);writeU16(cen,0);writeU16(cen,0);writeU16(cen,dt.dosTime);writeU16(cen,dt.dosDate);writeU32(cen,crc);writeU32(cen,dbb.length);writeU32(cen,dbb.length);writeU16(cen,nb.length);writeU16(cen,0);writeU16(cen,0);writeU16(cen,0);writeU16(cen,0);writeU32(cen,0);writeU32(cen,offset);central.push(new Uint8Array(cen),nb);offset+=local.length+nb.length+dbb.length});const cs=central.reduce((s,c)=>s+c.length,0),end=[];writeU32(end,0x06054b50);writeU16(end,0);writeU16(end,0);writeU16(end,files.length);writeU16(end,files.length);writeU32(end,cs);writeU32(end,offset);writeU16(end,0);return new Blob([...chunks,...central,new Uint8Array(end)],{type:'application/vnd.openxmlformats-officedocument.wordprocessingml.document'})}
function xmlEsc(v){return String(v==null?'':v).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function docxP(text,style){return String(text||'').split(/\n+/).map(line=>'<w:p>'+(style?'<w:pPr><w:pStyle w:val="'+style+'"/></w:pPr>':'')+'<w:r><w:t xml:space="preserve">'+xmlEsc(line)+'</w:t></w:r></w:p>').join('')||'<w:p/>'}
function docxBlob(title,chapters){const body=[docxP(title,'Title'),docxP('Exported from ACE Prism · '+new Date().toLocaleString(),'Subtitle')];chapters.forEach((c,i)=>{body.push(docxP((i+1)+'. '+c.title,'Heading1'));body.push(docxP(c.body||''))});const doc='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>'+body.join('')+'<w:sectPr/></w:body></w:document>';return makeZip([{name:'[Content_Types].xml',content:'<?xml version="1.0" encoding="UTF-8"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>'},{name:'_rels/.rels',content:'<?xml version="1.0" encoding="UTF-8"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>'},{name:'word/document.xml',content:doc}])}
function exportChapterDocx(id){const c=cache.chapters.find(x=>x.id===id);if(!c)return;download(docxBlob(c.title,[c]),slug(c.title)+'.docx')}
function exportBookDocx(id){const b=cache.books.find(x=>x.id===id),chs=cache.chapters.filter(c=>c.bookId===id).slice().reverse();if(!b||!chs.length){toast('No chapters');return}download(docxBlob(b.title,chs),slug(b.title)+'.docx')}

async function seedDefaults(){
 const defs=[
  {id:'the-day-the-oracle-went-silent',title:'The Day The Oracle Went Silent',premise:'A creative field awaiting its governing premise.'},
  {id:'omega',title:'Omega: War of Destiny',premise:'Timeline memory, Christ-Sophia field, love as harmonic weapon.'},
  {id:'the-void-shard',title:'The Void Shard',premise:'A creative field awaiting its governing premise.'},
  {id:'the-shimmerline',title:'The Shimmerline',premise:'Amazon, Antarctica, Denmark, Greece, India.'},
  {id:'raw-atomic',title:'Raw Atomic',premise:'Poetry, music and cultural voltage.'}
 ];
 const existing=new Set((await getAll('books')).map(x=>x.id));for(const b of defs)if(!existing.has(b.id))await putOne('books',{...b,createdAt:now(),updatedAt:now()});if(!session.activeBookId)session.activeBookId='omega'
}
window.ACE_PRISM_API={
 version:APP_VERSION,
 snapshot,
 buildPayload,
 getActiveContext:()=>activeContext(),
 emitScholarPacket:sendScholarPacket,
 emitLifestyleFlag,
 openBible,
 openVersions,
 openCreativeTool,
 analyzeRhythm,
 extractImagePalette,
 applyPatchObject:async p=>{validatePatchObject(p);$('patchInput').value=JSON.stringify(p,null,2);previewPatch();return patchPreview}
};

async function init(){
 try{
  db=await openDB();await loadSession();await runLegacyMigration(false);await seedDefaults();await refreshCache();
  if(!session.activeBookId&&cache.books[0])session.activeBookId=cache.books[0].id;
  installSwipe();renderCarousel();renderDock();updateAgentState();
  setTimeout(()=>$('splash').classList.add('off'),700);
  try{window.parent.postMessage({type:'ace_prism_ready',version:APP_VERSION},location.origin)}catch(e){}
 }catch(e){console.error(e);$('splash').innerHTML='<div class="card"><div class="card-title">ACE Prism could not start.</div><div class="meta">'+esc(e.message)+'</div></div>'}
}
document.addEventListener('DOMContentLoaded',init);
</script>
