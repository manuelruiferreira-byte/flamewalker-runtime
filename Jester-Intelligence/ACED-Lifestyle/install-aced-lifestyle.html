:root{color-scheme:dark;--gold:#d6a84f;--gold2:#fde68a;--cyan:#22d3ee;--text:#f8f2dc;--muted:#91a3b9}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#02040a;color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{display:grid;place-items:center;padding:22px;background:radial-gradient(circle at 50% 10%,rgba(34,211,238,.15),transparent 35%),radial-gradient(circle at 85% 18%,rgba(123,47,190,.14),transparent 30%),linear-gradient(180deg,#02040a,#06111f 58%,#02040a)}

.logo{width:96px;height:96px;margin:0 auto 16px;border:1px solid rgba(214,168,79,.34);border-radius:30px;background:rgba(0,0,0,.24);display:grid;place-items:center}.logo img{width:76%;height:76%;object-fit:contain}
h1{margin:0;color:#fff7d7;font-size:1.35rem}p{color:var(--muted);line-height:1.5;font-size:.9rem}.steps{margin:18px 0;text-align:left;border:1px solid rgba(255,255,255,.08);border-radius:20px;background:rgba(0,0,0,.2);padding:14px 16px;color:#cbd5e1;line-height:1.55;font-size:.86rem}
a{display:inline-flex;align-items:center;justify-content:center;min-height:46px;border-radius:16px;border:1px solid rgba(214,168,79,.42);background:linear-gradient(135deg,rgba(214,168,79,.2),rgba(34,211,238,.08));color:var(--gold2);text-decoration:none;padding:0 18px;font-weight:800}

  <div class="steps">In Chrome, open the menu and choose <b>Add to Home screen</b> or <b>Install app</b>. After installation, launch the new ACED icon.</div>
