/* v0.26 Jester Doctrine Logo Skin, CSS-only visual layer */
:root{
  --bg:#02040a;
  --panel:rgba(3,10,24,.88);
  --panel2:rgba(7,26,51,.72);
  --gold:#d6a84f;
  --gold2:#fde68a;
  --cyan:#22d3ee;
  --violet:#8b5cf6;
  --magenta:#d946ef;
  --text:#f8f2dc;
  --muted:#9fb0c6;
  --line:rgba(214,168,79,.34);
  --shadow:0 26px 90px rgba(0,0,0,.66);
}
body{
  background:
    radial-gradient(circle at 50% -12%,rgba(34,211,238,.20),transparent 34%),
    radial-gradient(circle at 78% 8%,rgba(139,92,246,.16),transparent 30%),
    radial-gradient(circle at 18% 12%,rgba(214,168,79,.14),transparent 28%),
    radial-gradient(circle at 50% 92%,rgba(217,70,239,.10),transparent 34%),
    linear-gradient(180deg,#02040a 0%,#06111f 48%,#02040a 100%);
}
.brand-card,.carousel-wrap,.modal-panel,.utility-dock{
  border-color:rgba(214,168,79,.36);
  box-shadow:0 24px 80px rgba(0,0,0,.62),0 0 42px rgba(34,211,238,.045),inset 0 1px 0 rgba(253,230,138,.08);
}
.brand-card{
  background:
    radial-gradient(circle at 9% 50%,rgba(34,211,238,.10),transparent 30%),
    linear-gradient(140deg,rgba(7,26,51,.90),rgba(2,4,10,.78));
}
.brand-mark,.suit,.app-logo{
  border-color:rgba(214,168,79,.44);
  background:linear-gradient(145deg,rgba(2,4,10,.58),rgba(7,26,51,.42));
  box-shadow:inset 0 0 24px rgba(214,168,79,.08),0 0 22px rgba(34,211,238,.055);
}
.title,.app-name,.essence-command,.row-title,.stat-value{
  color:#fff7d7;
  text-shadow:0 0 18px rgba(214,168,79,.11);
}
.card,.app-card,.stat-card,.queue-card,.advanced-tile,.tree-node{
  border-color:rgba(214,168,79,.25);
  background:
    linear-gradient(145deg,rgba(7,26,51,.62),rgba(2,6,14,.68));
  box-shadow:0 14px 38px rgba(0,0,0,.30),inset 0 1px 0 rgba(253,230,138,.05);
}
.app-card:hover,.advanced-tile:hover,.dock-btn:hover,.icon-btn:hover,.small-btn:hover{
  border-color:rgba(34,211,238,.42);
  box-shadow:0 0 28px rgba(34,211,238,.08),0 14px 38px rgba(0,0,0,.34);
}
.dot.active{
  background:linear-gradient(90deg,var(--gold2),var(--cyan));
  box-shadow:0 0 18px rgba(34,211,238,.28),0 0 14px rgba(214,168,79,.32);
}
.model-btn.model-active,.payload-btn.active,.primary{
  border-color:rgba(34,211,238,.58);
  background:linear-gradient(135deg,rgba(34,211,238,.16),rgba(214,168,79,.13),rgba(139,92,246,.10));
  color:#e9fbff;
  box-shadow:0 0 26px rgba(34,211,238,.08);
}
.handoff-gate{
  background:
    radial-gradient(circle at 50% 38%,rgba(34,211,238,.10),transparent 36%),
    radial-gradient(circle at 50% 64%,rgba(214,168,79,.08),transparent 34%),
    #000;
}


/* v0.27 ACE Mind hierarchy shell alignment */
html,body{width:100%;min-height:100svh;overscroll-behavior-y:none;-webkit-tap-highlight-color:transparent}
.app-shell{min-height:100svh;width:100vw;position:relative;z-index:1}

.main{min-height:calc(100svh - 116px);padding:10px 14px 96px}

.car-arrow{width:42px;height:42px;border-radius:999px;background:rgba(2,4,10,.54)}

.portal-command .essence-command{font-size:clamp(1.15rem,4vw,2rem)}

function installInfiniteCarouselClones(){
  const track=document.getElementById('carouselTrack');
  if(!track)return;
  Array.from(track.querySelectorAll('[data-clone]')).forEach(node=>node.remove());
  const originals=Array.from(track.children).filter(node=>!node.dataset.clone);
  if(originals.length!==CHAMBERS.length){track.dataset.loopReady='0';return}
  const first=originals[0].cloneNode(true);
  const last=originals[originals.length-1].cloneNode(true);
  first.dataset.clone='first';last.dataset.clone='last';
  first.setAttribute('aria-hidden','true');last.setAttribute('aria-hidden','true');
  first.querySelectorAll('[id]').forEach(el=>el.removeAttribute('id'));
  last.querySelectorAll('[id]').forEach(el=>el.removeAttribute('id'));
  track.insertBefore(last,originals[0]);
  track.appendChild(first);
  track.dataset.loopReady='1';
  carouselViewIndex=CHAMBERS.indexOf(activeChamber)+1;
}
function setCarouselTransform(viewIndex,animate=true){
  const track=document.getElementById('carouselTrack');if(!track)return;
  const expected=CHAMBERS.length+2;
  if(track.children.length!==expected)installInfiniteCarouselClones();
  const maxIndex=Math.max(0,(track.children.length||expected)-1);
  const safeIndex=Math.min(Math.max(0,viewIndex),maxIndex);
  track.style.transition=animate?'transform 560ms var(--ease)':'none';
  track.style.transform=`translateX(-${safeIndex*100}%)`;
  if(!animate){track.offsetHeight;track.style.transition='transform 560ms var(--ease)'}
}

function setChamber(id,save=true){
  activeChamber=CHAMBERS.includes(id)?id:'spades';
  carouselViewIndex=CHAMBERS.indexOf(activeChamber)+1;
  carouselAnimating=false;
  setCarouselTransform(carouselViewIndex,false);
  updateDots();
  document.body.dataset.chamber=activeChamber;
  if(save)saveState();else updateLens();
}
function shiftChamber(delta){moveChamber(delta)}
function moveChamber(dir){
  if(carouselAnimating)return;
  installInfiniteCarouselClones();
  const current=CHAMBERS.indexOf(activeChamber);
  const next=(current+dir+CHAMBERS.length)%CHAMBERS.length;
  activeChamber=CHAMBERS[next];
  carouselViewIndex+=dir;
  carouselAnimating=true;
  updateDots();
  document.body.dataset.chamber=activeChamber;
  setCarouselTransform(carouselViewIndex,true);
  clearTimeout(moveChamber._safety);
  moveChamber._safety=setTimeout(()=>{
    if(carouselAnimating){
      if(carouselViewIndex===0){carouselViewIndex=CHAMBERS.length;setCarouselTransform(carouselViewIndex,false)}
      else if(carouselViewIndex===CHAMBERS.length+1){carouselViewIndex=1;setCarouselTransform(carouselViewIndex,false)}
      carouselAnimating=false;
    }
  },720);
  saveState();
}
function initSwipe(){
  const el=document.getElementById('carouselWrap');
  const track=document.getElementById('carouselTrack');
  if(track&&!track.dataset.loopBound){
    track.dataset.loopBound='1';
    track.addEventListener('transitionend',(ev)=>{
      if(ev.target!==track || ev.propertyName!=='transform')return;
      if(carouselViewIndex===0){carouselViewIndex=CHAMBERS.length;setCarouselTransform(carouselViewIndex,false)}
      else if(carouselViewIndex===CHAMBERS.length+1){carouselViewIndex=1;setCarouselTransform(carouselViewIndex,false)}
      carouselAnimating=false;
    });
  }
  if(el&&!el.dataset.swipeBound){
    el.dataset.swipeBound='1';
    el.addEventListener('touchstart',e=>{const t=e.changedTouches[0];touchStartX=t.clientX;touchStartY=t.clientY},{passive:true});
    el.addEventListener('touchend',e=>{const t=e.changedTouches[0],dx=t.clientX-touchStartX,dy=t.clientY-touchStartY;if(Math.abs(dx)>55&&Math.abs(dx)>Math.abs(dy)*1.25)moveChamber(dx<0?1:-1)},{passive:true});
  }
}

function validateFlag(f){const e=[];if(!f||typeof f!=='object')return{ok:false,errors:['not an object']};if(f.schema_version!=='0.2')e.push('schema_version must be "0.2"');if(!f.flag_id||String(f.flag_id).length<6)e.push('flag_id missing/too short');if(!f.created_at)e.push('created_at missing');if(!f.source)e.push('source missing');if(!FLAG_SRCTYPES.includes(f.source_type))e.push('source_type invalid');if(!FLAG_DOMAINS.includes(f.domain))e.push('domain invalid');if(!f.headline||!String(f.headline).trim())e.push('headline missing');if(!FLAG_LEVELS.includes(f.urgency))e.push('urgency invalid');if(!FLAG_LEVELS.includes(f.importance))e.push('importance invalid');if(typeof f.confidence!=='number'||f.confidence<0||f.confidence>1)e.push('confidence must be 0..1');if(f.status&&!FLAG_STATUSES.includes(f.status))e.push('status invalid');if(!f.expires_at||isNaN(new Date(f.expires_at).getTime()))e.push('expires_at invalid');if(f.veto===true&&!VETO_DOMAINS.includes(f.domain))e.push('veto only allowed for mind/gravitic/system');return{ok:e.length===0,errors:e}}

function rankFlags(flags,now){now=now||new Date();const W={critical:4,high:3,normal:2,low:1};const review=[],expired=[];let candidates=[];for(const f of (flags||[])){if(f.status!=='active')continue;if(new Date(f.expires_at)<=now){f.status='expired';f.resolved_at=now.toISOString();expired.push(f);continue}if(f.admissibility==='rejected')continue;if(f.admissibility==='pending'){review.push(f);continue}candidates.push(f)}for(const f of candidates){let s=W[f.urgency]*W[f.importance]*f.confidence;if(f.admissibility==='downgraded')s*=0.5;f.rank_score=Math.round(s*100)/100}const veto=candidates.filter(f=>f.veto===true).sort((a,b)=>b.rank_score-a.rank_score);const decisions=candidates.filter(f=>f.veto!==true&&f.requires_decision===true).sort((a,b)=>b.rank_score-a.rank_score);const queue=candidates.filter(f=>f.veto!==true&&f.requires_decision!==true).sort((a,b)=>b.rank_score-a.rank_score);return{veto,decisions,queue,review,expired}}

function previewPatch(){try{const p=JSON.parse(document.getElementById('patchInput').value);validatePatch(p);document.getElementById('patchOutput').textContent='VALID\n'+JSON.stringify(p,null,2)}catch(e){document.getElementById('patchOutput').textContent='ERROR: '+e.message}}
function applyPatch(){try{const p=JSON.parse(document.getElementById('patchInput').value);validatePatch(p);p.ops.forEach(applyOp);saveState();render();document.getElementById('patchOutput').textContent='APPLIED';toast('Patch applied')}catch(e){document.getElementById('patchOutput').textContent='ERROR: '+e.message}}
function applyOp(op){const d=op.data||{};if(op.op==='set_active_chamber')setChamber(d.chamber||d.id||'spades',false);if(op.op==='upsert_app'){const clean=sanitizeApp(d);const i=state.apps.findIndex(a=>a.id===clean.id);if(i>=0)state.apps[i]=Object.assign({},state.apps[i],clean);else if(clean.id)state.apps.push(clean)}if(op.op==='add_packet')state.packets.push(Object.assign({importedAt:new Date().toISOString()},d));if(op.op==='add_approval')state.approvals.push(Object.assign({status:'pending'},d));if(op.op==='update_approval_status'&&state.approvals[d.index])state.approvals[d.index].status=d.status||'pending';if(op.op==='add_route')state.routes.push(d);if(op.op==='add_log_entry')state.logs.push(Object.assign({at:new Date().toISOString()},d));if(op.op==='replace_app_config'){state=mergeState(initialState(),d);activeChamber=CHAMBERS.includes(state.activeChamber)?state.activeChamber:'spades'}}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}function today(){return new Date().toISOString().slice(0,10)}
function loadImages(root){root.querySelectorAll('img[data-src]').forEach(img=>{const src=img.getAttribute('data-src');if(!src)return;img.onerror=()=>{img.removeAttribute('src');img.style.display='none'};img.src=safeAssetUrl(src,'')})}
function safeHeaderLogo(){const img=document.getElementById('brandLogo');img.onerror=()=>{img.removeAttribute('src');img.style.display='none'};img.src=safeAssetUrl(ASSETS.appLogo,'')}
let appInitialized=false;
let backRouterInstalled=false;
function initApp(){
  if(appInitialized)return;
  activeChamber='spades';
  state.activeChamber='spades';
  safeHeaderLogo();
  render();
  installInfiniteCarouselClones();
  initSwipe();
  renderAI();
  updateLens();
  installBackRouter();
  appInitialized=true;
}
function clearLegacyAIReturnNoise(){
  try{
    ['aced_lifestyle_return_ai','aced_lifestyle_last_model','aced_lifestyle_pending_ai_payload_meta','ace_mind_return_ai','ace_mind_last_model','ace_mind_pending_ai_payload_meta'].forEach(k=>{
      sessionStorage.removeItem(k);
      localStorage.removeItem(k);
    });
  }catch(e){}
}
function startDirectApp(){
  clearLegacyAIReturnNoise();
  initApp();
  returnToSpades('Spades',false);
  document.body.classList.remove('booting');
  document.body.classList.add('ready');
}
function returnToSpades(label='Spades',save=true){
  document.querySelectorAll('.modal.open').forEach(m=>m.classList.remove('open'));
  document.getElementById('handoffGate')?.classList.remove('open');
  setChamber('spades',save);
}
function installBackRouter(){
  if(backRouterInstalled)return;
  backRouterInstalled=true;
  try{
    history.replaceState({app:'aced-lifestyle',screen:'spades'},'',location.href);
    history.pushState({app:'aced-lifestyle',screen:'app'},'',location.href);
  }catch(e){}
  window.addEventListener('popstate',()=>{
    if(!appInitialized)return;
    const anyModal=!!document.querySelector('.modal.open')||document.getElementById('handoffGate')?.classList.contains('open');
    if(activeChamber!=='spades'||anyModal){
      returnToSpades('Spades',true);
      try{history.pushState({app:'aced-lifestyle',screen:'app'},'',location.href)}catch(e){}
    }
  });
  window.addEventListener('focus',handleAIReturnCleanup);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden)handleAIReturnCleanup()});
}
window.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')moveChamber(-1);if(e.key==='ArrowRight')moveChamber(1)});
window.addEventListener('DOMContentLoaded',()=>{startDirectApp()});
</script>
</body>
