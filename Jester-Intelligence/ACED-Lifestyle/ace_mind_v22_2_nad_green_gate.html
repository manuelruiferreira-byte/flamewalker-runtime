/* v21.4 final gates */
.conv-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-top:10px}
.conv-card{border:1px solid rgba(214,168,79,.18);background:rgba(255,255,255,.028);border-radius:16px;padding:11px;min-height:92px}
.conv-card b{display:block;color:#fde68a;font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;margin-bottom:6px}
.conv-card div{font-size:.86rem;color:#cbd5e1;line-height:1.42}
.conv-synthesis{border-left:3px solid var(--cyan);background:rgba(34,211,238,.07);border-radius:0 14px 14px 0;padding:11px;margin-top:10px;color:#dbeafe;font-size:.91rem;line-height:1.45}

/* v21.11 AI anchor handoff: model choices are real links for mobile reliability */

/* v21.14 logo-skin: visual-only ACE Mind palette refinement.
   Mechanics, data, AI handoff, boot, router, supplements, and state logic untouched. */
:root{
  --bg:#01030a;
  --panel:rgba(4,11,25,.90);
  --panel2:rgba(7,20,42,.78);
  --gold:#d9a64a;
  --gold2:#fff0ad;

  --violet:#8b5cf6;
  --red:#ff4f6d;

  --orange:#ff9b4a;
  --yellow:#ffe169;
  --blue:#82caff;
  --text:#fff5d6;
  --muted:#9fb4ce;
  --line:rgba(217,166,74,.34);

.app-shell{position:relative;z-index:1}
.boot-overlay{background:radial-gradient(circle at 50% 42%,rgba(32,231,255,.08),transparent 34%),#000}
.enter-btn{
  border-color:rgba(217,166,74,.62);

  box-shadow:0 0 34px rgba(217,166,74,.20),0 0 52px rgba(32,231,255,.08);

.boot-logo{
  filter:drop-shadow(0 0 30px rgba(217,166,74,.36)) drop-shadow(0 0 58px rgba(32,231,255,.22)) drop-shadow(0 0 72px rgba(139,92,246,.13));
}
.topbar{
  background:linear-gradient(180deg,rgba(1,3,10,.96),rgba(1,3,10,.74) 74%,transparent);
}
.brand-card,.day-panel,.carousel-wrap,.modal-panel,.utility-dock{
  border-color:rgba(217,166,74,.34);
  background:
    radial-gradient(circle at 50% 0%,rgba(32,231,255,.08),transparent 35%),

  box-shadow:0 22px 80px rgba(0,0,0,.62),inset 0 1px 0 rgba(255,240,173,.08);

.brand-card{
  border-radius:28px;
}
.brand-mark,.icon-btn,.small-btn,.dock-btn,.day-btn,.payload-btn,.model-btn,.x{
  border-color:rgba(217,166,74,.30);

function suppClass(cbr,g,name){

function tickSupp(date,name){

  state.supp[k]=ticked;

  const ed=fwEngineDay(date);

  const body=bodySummaryForDate(date);

  const prev=state.suppLog[date]&&typeof state.suppLog[date]==='object'?state.suppLog[date]:{};
  const events=Array.isArray(prev.events)?prev.events.slice(-80):[];
  const event={name,ticked,at:new Date().toISOString(),block:ed.block,blockName:bl.name,bodyGovernor:body.governor,blockAssignment:ed.blockAssignment||null};
  events.push(event);
  state.suppLog[date]={...prev,block:ed.block,blockName:bl.name,taken,events,lastEvent:event,reason:ed.blockReason,blockAssignment:ed.blockAssignment||null,at:event.at};
  if(ed.blockAssignment){state.blockHistory[date]={...ed.blockAssignment,at:event.at};}

  saveState();
  render();
}

// ── Date helpers ─────────────────────────────────────────────────────────────
function fwBrusselsTime() {
  try {
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'Europe/Brussels',
      year:'numeric', month:'2-digit', day:'2-digit',
      hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false
    }).formatToParts(new Date());
    const get = t => (parts.find(p => p.type === t) || {value:'00'}).value;
    return {
      isoDate: `${get('year')}-${get('month')}-${get('day')}`,
      h: parseInt(get('hour'), 10),
      m: parseInt(get('minute'), 10),
      s: parseInt(get('second'), 10)
    };
  } catch(e) {
    const n = new Date();
    return {
      isoDate: n.getFullYear() + '-' + ('0'+(n.getMonth()+1)).slice(-2) + '-' + ('0'+n.getDate()).slice(-2),
      h: n.getHours(), m: n.getMinutes(), s: n.getSeconds()
    };
  }
}

function fwRefDays(isoDate) {
  return Math.round(
    (new Date(isoDate + 'T12:00:00Z') - new Date(FW_REF.date + 'T12:00:00Z')) / 86400000
  );
}

// ── 15:00 Brussels hinge ─────────────────────────────────────────────────────
// Before 15:00 Brussels: personal day uses PREVIOUS calendar date.
// At/after 15:00 Brussels: personal day uses CURRENT calendar date.
function fwHingeDate() {
  const bt = fwBrusselsTime();
  const isPost = bt.h >= 15;
  let personalIso = bt.isoDate;
  if (!isPost) {
    const d = new Date(bt.isoDate + 'T12:00:00Z');
    d.setUTCDate(d.getUTCDate() - 1);
    personalIso = d.toISOString().slice(0, 10);
  }
  const currentMins = bt.h * 60 + bt.m;
  const hingeMins   = 15 * 60;
  const minsToHinge = isPost
    ? (24 * 60 - currentMins) + hingeMins
    : hingeMins - currentMins;
  const hh = Math.floor(minsToHinge / 60), mm = minsToHinge % 60;
  return {
    worldIso:    bt.isoDate,
    personalIso: personalIso,
    isPost:      isPost,
    label:       isPost
      ? 'Post-hinge: current personal day active'
      : 'Pre-hinge: carrying previous personal day',
    countdown: `${hh}h ${mm}m until next hinge`
  };
}

// ── fwSunriseSet: NOAA simplified solar position ──────────────────────────────
function fwSunriseSet(lat, lon, isoDate) {
  const [y, m, d] = (isoDate || brusselsISODate()).split('-').map(Number);
  const JD  = 367*y - Math.floor(7*(y + Math.floor((m+9)/12))/4) + Math.floor(275*m/9) + d + 1721013.5;
  const n   = JD - 2451545.0;
  const L   = (280.46 + 0.9856474*n) % 360;
  const g   = ((357.528 + 0.9856003*n) % 360) * Math.PI / 180;
  const lam = (L + 1.915*Math.sin(g) + 0.02*Math.sin(2*g)) * Math.PI / 180;
  const eps = 23.439 * Math.PI / 180;
  const alpha = Math.atan2(Math.cos(eps)*Math.sin(lam), Math.cos(lam)) * 180 / Math.PI;
  const delta = Math.asin(Math.sin(eps) * Math.sin(lam));
  const latR  = lat * Math.PI / 180;
  const cosH  = (Math.cos(1.585 * Math.PI / 180) - Math.sin(latR)*Math.sin(delta)) / (Math.cos(latR)*Math.cos(delta));
  if (Math.abs(cosH) > 1) return null;
  const H    = Math.acos(cosH) * 180 / Math.PI;
  const noon = 12 - lon / 15;
  return { riseUTC: noon - H/15, setUTC: noon + H/15 };
}

// ── fwPlanetaryHour: current Chaldean planetary hour ─────────────────────────
function fwPlanetaryHour(lat, lon) {
  const isoDate = brusselsISODate();
  const ss = fwSunriseSet(lat || 50.85, lon || 4.35, isoDate);
  const fallback = { planet:'Sun', sym:'\u2609', minutesLeft:60, remaining:'60m', period:'day', hourNum:1, dayRuler:'Sun', riseUTC:5.5, setUTC:21.0 };
  if (!ss) return fallback;
  const now  = new Date();
  const utcH = now.getUTCHours() + now.getUTCMinutes()/60 + now.getUTCSeconds()/3600;
  const dayLen   = ss.setUTC - ss.riseUTC;
  const nightLen = 24 - dayLen;
  const dayHrLen   = dayLen   / 12;
  const nightHrLen = nightLen / 12;
  const dow        = new Date(isoDate + 'T12:00:00Z').getUTCDay();
  const dayRulerIdx = FW_DAY_RULERS[dow];
  let hourIdx, hourLen, hourStart, period;
  if (utcH >= ss.riseUTC && utcH < ss.setUTC) {
    hourIdx   = Math.floor((utcH - ss.riseUTC) / dayHrLen);
    hourLen   = dayHrLen;
    hourStart = ss.riseUTC + hourIdx * dayHrLen;
    period    = 'day';
  } else {
    const adj = utcH < ss.riseUTC ? utcH + 24 : utcH;
    hourIdx   = 12 + Math.floor((adj - ss.setUTC) / nightHrLen);
    hourLen   = nightHrLen;
    hourStart = ss.setUTC + (hourIdx - 12) * nightHrLen;
    if (utcH < ss.riseUTC) hourStart -= 24;
    period    = 'night';
  }
  const planetIdx = (dayRulerIdx + hourIdx) % 7;
  const planet    = FW_CHALDEAN[planetIdx];
  const sym       = FW_PLANET_SYM[planet];
  const dayRuler  = FW_CHALDEAN[dayRulerIdx];
  const adjUTC    = (utcH < ss.riseUTC && period === 'night') ? utcH + 24 : utcH;
  const elapsed   = adjUTC - hourStart;
  const minsLeft  = Math.max(0, Math.round((hourLen - elapsed) * 60));
  const hLeft     = Math.floor(minsLeft / 60);
  const mLeft     = minsLeft % 60;
  const remaining = hLeft > 0 ? `${hLeft}h ${mLeft}m` : `${mLeft}m`;
  return { planet, sym, minutesLeft:minsLeft, remaining, period, hourNum:(hourIdx % 12) + 1, dayRuler, riseUTC:ss.riseUTC, setUTC:ss.setUTC };
}

// ── Analog Clock SVG ──────────────────────────────────────────────────────────
function fwClockSVG(h, m, s) {
  const cx = 50, cy = 50;
  function pt(deg, r) {
    const rad = (deg - 90) * Math.PI / 180;
    return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
  }
  const hDeg = (h % 12 + m / 60) * 30;
  const mDeg = (m + s / 60) * 6;
  const sDeg = s * 6;
  const [hx,hy] = pt(hDeg, 26), [mx,my] = pt(mDeg, 35);
  const [sx,sy] = pt(sDeg, 40), [sbx,sby] = pt(sDeg + 180, 10);
  let ticks = '';
  for (let i = 0; i < 60; i++) {
    const isHour = i % 5 === 0;
    const [a, b] = [pt(i*6, isHour ? 43.5 : 45), pt(i*6, 47)];
    ticks += `<line x1="${a[0].toFixed(1)}" y1="${a[1].toFixed(1)}" x2="${b[0].toFixed(1)}" y2="${b[1].toFixed(1)}" stroke="${isHour ? '#d9a64a' : 'rgba(217,166,74,0.28)'}" stroke-width="${isHour ? '1.6' : '0.6'}" stroke-linecap="round"/>`;
  }
  return `<svg viewBox="0 0 100 100" class="fw-to-clock-svg">` +
    `<circle cx="50" cy="50" r="49" fill="none" stroke="rgba(217,166,74,0.10)" stroke-width="0.5"/>` +
    `<circle cx="50" cy="50" r="42" fill="rgba(1,3,10,0.72)" stroke="rgba(217,166,74,0.20)" stroke-width="0.5"/>` +
    ticks +
    `<line x1="50" y1="50" x2="${hx.toFixed(1)}" y2="${hy.toFixed(1)}" stroke="#d9a64a" stroke-width="2.8" stroke-linecap="round"/>` +
    `<line x1="50" y1="50" x2="${mx.toFixed(1)}" y2="${my.toFixed(1)}" stroke="#b8a8e0" stroke-width="1.8" stroke-linecap="round"/>` +
    `<line x1="${sbx.toFixed(1)}" y1="${sby.toFixed(1)}" x2="${sx.toFixed(1)}" y2="${sy.toFixed(1)}" stroke="#ff4f6d" stroke-width="1.1" stroke-linecap="round"/>` +
    `<circle cx="50" cy="50" r="2.8" fill="#d9a64a"/>` +
    `<circle cx="50" cy="50" r="1.2" fill="#01030a"/>` +
    `</svg>`;
}

function buildRollingDates(){
  const today=brusselsISODate();
  const base=new Date(today+'T12:00:00Z');
  const days=[];
  for(let i=0;i<15;i++){
    const dt=new Date(base);
    dt.setUTCDate(dt.getUTCDate()+i);
    const iso=dt.toISOString().slice(0,10);
    days.push({iso,wd:fwWeekdayName(iso),dm:Number(iso.slice(8,10)),visible:true});
  }
  if(activeDate&&!days.some(x=>x.iso===activeDate)){
    days.unshift({iso:activeDate,wd:fwWeekdayName(activeDate),dm:Number(activeDate.slice(8,10)),visible:false});
  }
  return days;
}

  // v21.20: render() rewrites the track contents but keeps dataset flags on the
  // same DOM node. The old endless-loop guard could therefore skip clone rebuilds,
  // leaving the carousel translated to clone indexes that no longer existed. That
  // made chambers/menus seem to disappear until another swipe. Always normalize.
  Array.from(track.querySelectorAll('[data-clone]')).forEach(node=>node.remove());
  const originals=Array.from(track.children).filter(node=>!node.dataset.clone);
  if(originals.length!==CHAMBERS.length){
    track.dataset.loopReady='0';
    return;
  }
  const first=originals[0].cloneNode(true);
  const last=originals[originals.length-1].cloneNode(true);
  first.dataset.clone='first';
  last.dataset.clone='last';
  first.setAttribute('aria-hidden','true');
  last.setAttribute('aria-hidden','true');
  first.querySelectorAll('[id]').forEach(el=>el.removeAttribute('id'));
  last.querySelectorAll('[id]').forEach(el=>el.removeAttribute('id'));
  track.insertBefore(last,originals[0]);
  track.appendChild(first);
  track.dataset.loopReady='1';
  carouselViewIndex=CHAMBERS.indexOf(activeChamber)+1;
}
function setCarouselTransform(viewIndex,animate=true){

  if(track.children.length!==expected){
    installInfiniteCarouselClones();
  }
  const maxIndex=Math.max(0,(track.children.length||expected)-1);
  const safeIndex=Math.min(Math.max(0,viewIndex),maxIndex);
  track.style.transition=animate?'transform 560ms var(--ease)':'none';
  track.style.transform=`translateX(-${safeIndex*100}%)`;
  if(!animate){
    track.offsetHeight;
    track.style.transition='transform 560ms var(--ease)';
  }
}

function downloadJson(obj,name){const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(url),500)}
function importStateFile(ev){
  const f=ev.target.files&&ev.target.files[0];
  if(!f)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const data=JSON.parse(r.result);
      state=mergeState(state,data);
      activeDate=state.activeDate||brusselsISODate();
      activeIdx=validIndex(state.activeIdx??todayIndex());
      activeChamber=CHAMBERS.includes(state.activeChamber)?state.activeChamber:'spades';
      saveState();
      render();
      setChamber(activeChamber,true,true);
      toast('Imported');
    }catch(e){toast('Import failed');}
  };
  r.readAsText(f);
  ev.target.value='';
}
function safeHeaderLogo(){const img=document.getElementById('brandLogo');img.onerror=()=>{img.removeAttribute('src');img.style.display='none'};img.src=ASSETS.appLogo}
let bootStarted=false;
let appInitialized=false;
function bindEnterGate(){
  const btn=document.getElementById('enterBtn');
  if(!btn)return;
  btn.disabled=false;
  btn.setAttribute('aria-label','Enter ACE Mind');
}
async function startBoot(){
  if(bootStarted)return;
  bootStarted=true;
  const enter=document.getElementById('enterGate');
  const stage=document.getElementById('bootStage');
  const overlay=document.getElementById('bootOverlay');
  if(enter)enter.style.display='none';
  if(stage)stage.classList.add('live');
  const logos=[['Jester Intelligence',ASSETS.jesterLogo],['ACED',ASSETS.acedLogo],['ACE Mind',ASSETS.appLogo]];
  try{
    const loaded=await Promise.all(logos.map(x=>preload(x[1])));
    for(let i=0;i<logos.length;i++)await showBoot(logos[i][0],loaded[i]);
  }catch(e){console.error('Boot sequence error',e);}
  initApp();
  document.body.classList.remove('booting');
  document.body.classList.add('ready');
  if(overlay)overlay.classList.add('boot-exit');
}
window.startBoot=startBoot;
function initApp(){
  if(appInitialized)return;
  appInitialized=true;
  try{
    activeDate=state.activeDate||brusselsISODate();
    activeIdx=validIndex(state.activeIdx??todayIndex());
    activeChamber=CHAMBERS.includes(state.activeChamber)?state.activeChamber:'spades';
    state.activeDate=activeDate;
    state.activeChamber=activeChamber;
    requestTemporalGeolocation(false);
    render();
    initSwipe();
    renderAI();
    setChamber(activeChamber,true,true);
    installBackToSpades();
    updateLens();
    document.getElementById('dayRail')?.querySelector('.day-btn.active')?.scrollIntoView({inline:'center',block:'nearest'});
  }catch(e){
    console.error('ACE Mind init failed',e);
    const main=document.querySelector('.main');
    if(main)main.innerHTML='<div class="card"><div class="focus-title">ACE Mind could not initialize</div><div class="small">Error: '+escapeHtml(e.message||e)+'</div></div>';
  }
}
function preload(src){return new Promise(resolve=>{const img=new Image();let settled=false;const done=(ok)=>{if(settled)return;settled=true;resolve({ok,src})};const t=setTimeout(()=>done(false),2600);img.onload=()=>{clearTimeout(t);done(true)};img.onerror=()=>{clearTimeout(t);done(false)};img.src=src})}
function showBoot(label,res){return new Promise(resolve=>{const stage=document.getElementById('bootStage');if(!stage){resolve();return}stage.innerHTML='';const isFirst=label==='Jester Intelligence';if(res.ok){const img=document.createElement('img');img.className='boot-logo'+(isFirst?' first-boot-logo':'');img.src=res.src;stage.appendChild(img)}else{const div=document.createElement('div');div.className='boot-fallback'+(isFirst?' first-boot-logo':'');div.textContent=label;stage.appendChild(div)}stage.className='boot-stage live';requestAnimationFrame(()=>stage.classList.add('show'));setTimeout(()=>{stage.classList.remove('show');stage.classList.add('hide');setTimeout(resolve,850)},label==='ACE Mind'?2600:(isFirst?2000:1250))})}
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
window.addEventListener('DOMContentLoaded',()=>{
  clearAIReturnFlags();
  clearLegacyAIReturnFlags();
  ensureBridgeChannel();
  bindEnterGate();
});
</script>
