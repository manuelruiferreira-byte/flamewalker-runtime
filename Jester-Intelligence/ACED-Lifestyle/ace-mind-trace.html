<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
<meta name="theme-color" content="#02040a" />
<title>ACE Mind</title>
<link rel="manifest" href="./manifest.json" />
<meta name="mobile-web-app-capable" content="yes" />
<style>
  html,body{margin:0;width:100%;height:100%;background:#02040a;overflow:hidden}
  #aceMindFrame{position:fixed;inset:0;width:100%;height:100%;border:0;background:#02040a}
</style>
</head>
<body>
<iframe id="aceMindFrame" src="./ace-mind.html?v=canonical-profile-v3-3" title="ACE Mind"></iframe>
<script>
(function(){
  'use strict';
  const frame=document.getElementById('aceMindFrame');
  const traceSrc='./shared/js/ace-mind-trace-store-v0-1.js';
  const profileSrc='./shared/js/flamewalker-canonical-profile-v3-3.js';

  function expose(){
    try{
      if(frame.contentWindow){
        if(frame.contentWindow.ACETraceStore)window.ACETraceStore=frame.contentWindow.ACETraceStore;
        if(frame.contentWindow.FLAMEWALKER_CANONICAL_PROFILE)window.FLAMEWALKER_CANONICAL_PROFILE=frame.contentWindow.FLAMEWALKER_CANONICAL_PROFILE;
        if(frame.contentWindow.ACE_MIND_CANONICAL_PROFILE_APPLIED)window.ACE_MIND_CANONICAL_PROFILE_APPLIED=frame.contentWindow.ACE_MIND_CANONICAL_PROFILE_APPLIED;
        window.ACE_MIND_TRACE_FRAME=frame;
        return !!frame.contentWindow.ACETraceStore;
      }
    }catch(e){}
    return false;
  }

  function injectTrace(doc){
    if(doc.getElementById('ace-mind-trace-store-v0-1-loader')){expose();return;}
    const s=doc.createElement('script');
    s.id='ace-mind-trace-store-v0-1-loader';
    s.src=traceSrc;
    s.onload=function(){setTimeout(expose,250);};
    doc.body.appendChild(s);
  }

  function applyCanonicalProfile(doc,w){
    function run(){
      if(!w.FlamewalkerCanonicalProfileV33)return Promise.reject(new Error('Canonical profile bridge unavailable'));
      return w.FlamewalkerCanonicalProfileV33.load(true)
        .then(function(p){return w.FlamewalkerCanonicalProfileV33.applyAceMind(p);})
        .then(function(){expose();return true;});
    }

    const existing=doc.getElementById('flamewalker-canonical-profile-v3-3-loader');
    if(existing){
      if(w.FlamewalkerCanonicalProfileV33)return run();
      return new Promise(function(resolve,reject){
        existing.addEventListener('load',function(){run().then(resolve,reject);},{once:true});
        existing.addEventListener('error',reject,{once:true});
      });
    }

    return new Promise(function(resolve,reject){
      const s=doc.createElement('script');
      s.id='flamewalker-canonical-profile-v3-3-loader';
      s.src=profileSrc;
      s.onload=function(){run().then(resolve,reject);};
      s.onerror=function(){reject(new Error('Canonical profile script failed to load'));};
      doc.body.appendChild(s);
    });
  }

  function inject(){
    try{
      const w=frame.contentWindow;
      const doc=frame.contentDocument||w.document;
      if(!doc||!doc.body)return;
      applyCanonicalProfile(doc,w)
        .catch(function(e){console.warn('ACE Mind canonical profile application failed',e);})
        .finally(function(){injectTrace(doc);});
      let tries=0;
      const t=setInterval(function(){tries++;if(expose()||tries>24)clearInterval(t);},250);
    }catch(e){console.warn('ACE Mind launcher injection failed',e);}
  }

  frame.addEventListener('load',function(){setTimeout(inject,250);});
})();
</script>
</body>
</html>
