<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
<meta name="theme-color" content="#02040a" />
<title>ACE Cluster</title>
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="mobile-web-app-capable" content="yes" />
<style>html,body{margin:0;width:100%;height:100%;background:#02040a;overflow:hidden}iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#02040a}</style>
</head>
<body>
<iframe id="appFrame" src="../ACED-Lifestyle/ace-cluster.html" title="ACE Cluster"></iframe>
<script>
(function(){
  'use strict';
  const frame=document.getElementById('appFrame');
  function syncToday(){
    try{
      const w=frame.contentWindow;
      if(!w)return;
      const today=typeof w.todayIso==='function'?w.todayIso():new Date().toISOString().slice(0,10);
      if(w.state&&w.state.activeDate!==today){
        if(typeof w.setActiveDate==='function')w.setActiveDate(today);
        else {w.state.activeDate=today;if(typeof w.saveState==='function')w.saveState();}
      }
    }catch(e){}
  }
  frame.addEventListener('load',()=>{setTimeout(syncToday,250);setTimeout(syncToday,1200);});
})();
</script>
</body>
</html>
