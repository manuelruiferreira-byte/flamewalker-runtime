<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
<meta name="theme-color" content="#02040a" />
<title>ACE Cluster</title>
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="mobile-web-app-capable" content="yes" />
<style>html,body{margin:0;width:100%;height:100%;background:#02040a;overflow:hidden}iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#02040a}.fallback{position:fixed;inset:0;display:grid;place-items:center;padding:24px;color:#fff5d6;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 50% 0%,rgba(214,168,79,.18),transparent 34%),linear-gradient(180deg,#02040a,#06111f)}.card{width:min(92vw,560px);border:1px solid rgba(214,168,79,.28);border-radius:28px;background:rgba(5,12,26,.84);padding:24px;box-shadow:0 24px 80px rgba(0,0,0,.58);text-align:center}.k{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:#fde68a}.t{font-size:2rem;font-weight:900;margin-top:6px}.p{color:#b7c8dc;line-height:1.45;margin-top:10px}</style>
</head>
<body>
<iframe id="appFrame" src="../ACED-Lifestyle/ace-cluster.html" title="ACE Cluster"></iframe>
<div id="fallback" class="fallback" style="display:none"><div class="card"><div class="k">ACE Cluster</div><div class="t">Runtime not found yet</div><div class="p">Upload or create <b>Jester-Intelligence/ACED-Lifestyle/ace-cluster.html</b>. The isolated PWA shell is ready and will load it automatically.</div></div></div>
<script>
(function(){
  'use strict';
  const frame=document.getElementById('appFrame');
  const fallback=document.getElementById('fallback');
  let loaded=false;
  frame.addEventListener('load',()=>{loaded=true;setTimeout(()=>{try{const doc=frame.contentDocument||frame.contentWindow.document;if(doc&&doc.body&&doc.body.textContent.match(/404|Not Found/i)){fallback.style.display='grid';frame.style.display='none';}}catch(e){}},500);});
  setTimeout(()=>{if(!loaded&&fallback){fallback.style.display='grid';frame.style.display='none';}},3500);
})();
</script>
</body>
</html>
