<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
<meta name="theme-color" content="#02040a" />
<title>ACE Cluster</title>
<link rel="manifest" href="./manifest.webmanifest" />
<meta name="mobile-web-app-capable" content="yes" />
<style>
html,body{margin:0;width:100%;height:100%;background:#02040a;overflow:hidden}
iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#02040a;opacity:0;transition:opacity .18s ease}
iframe.ready{opacity:1}
</style>
</head>
<body>
<iframe id="appFrame" src="../ACED-Lifestyle/ace-cluster.html?v=cluster-no-enter-20260601" title="ACE Cluster"></iframe>
<script>
(function(){
  'use strict';
  var frame=document.getElementById('appFrame');
  var logo='../ACED-Lifestyle/shared/assets/logos/ace-cluster.png';

  function patchCluster(){
    try{
      var w=frame.contentWindow;
      var doc=frame.contentDocument;
      if(!w || !doc)return false;

      var overlay=doc.getElementById('bootOverlay');
      if(overlay) overlay.remove();

      if(doc.body){
        doc.body.classList.remove('booting');
        doc.body.classList.add('ready');
      }

      var mark=doc.querySelector('.brand-mark');
      if(mark && !mark.dataset.clusterLogoPatched){
        mark.dataset.clusterLogoPatched='1';
        mark.textContent='';
        mark.setAttribute('aria-label','ACE Cluster');
        mark.style.padding='0';
        mark.style.overflow='hidden';
        mark.style.background='rgba(2,4,10,.55)';
        var img=doc.createElement('img');
        img.src=logo;
        img.alt='ACE Cluster';
        img.style.width='100%';
        img.style.height='100%';
        img.style.objectFit='cover';
        img.style.borderRadius='inherit';
        img.style.display='block';
        mark.appendChild(img);
      }

      var today=typeof w.todayIso==='function'?w.todayIso():new Date().toISOString().slice(0,10);
      if(w.state && w.state.activeDate!==today){
        if(typeof w.setActiveDate==='function')w.setActiveDate(today);
        else {w.state.activeDate=today;if(typeof w.saveState==='function')w.saveState();}
      }

      frame.classList.add('ready');
      return true;
    }catch(e){
      frame.classList.add('ready');
      return false;
    }
  }

  frame.addEventListener('load',function(){
    patchCluster();
    setTimeout(patchCluster,100);
    setTimeout(patchCluster,350);
    setTimeout(patchCluster,900);
  });

  setTimeout(function(){frame.classList.add('ready');},2500);
})();
</script>
</body>
</html>
