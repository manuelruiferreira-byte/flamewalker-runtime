<title>ACE Cluster</title>
<link rel="manifest" href="data:application/manifest+json,%7B%22id%22%3A%22https%3A%2F%2Fmanuelruiferreira-byte.github.io%2Fflamewalker-runtime%2FJester-Intelligence%2FACE-Cluster-App%2F%22%2C%22name%22%3A%22ACE%20Cluster%22%2C%22short_name%22%3A%22Cluster%22%2C%22description%22%3A%22ACE%20Cluster%20orchestration%20chamber%20for%20agents%2C%20council%2C%20suite%20command%2C%20savings%2C%20clustering%2C%20and%20cross-app%20routing.%22%2C%22start_url%22%3A%22https%3A%2F%2Fmanuelruiferreira-byte.github.io%2Fflamewalker-runtime%2FJester-Intelligence%2FACE-Cluster-App%2F%3Fv%3Dcluster-handoff-v2-20260605%22%2C%22scope%22%3A%22https%3A%2F%2Fmanuelruiferreira-byte.github.io%2Fflamewalker-runtime%2FJester-Intelligence%2FACE-Cluster-App%2F%22%2C%22display%22%3A%22standalone%22%2C%22orientation%22%3A%22portrait%22%2C%22background_color%22%3A%22%2301030a%22%2C%22theme_color%22%3A%22%2301030a%22%2C%22categories%22%3A%5B%22productivity%22%2C%22finance%22%2C%22utilities%22%5D%2C%22icons%22%3A%5B%7B%22src%22%3A%22data%3Aimage%2Fsvg%2Bxml%2C%253Csvg%2520xmlns%253D%2522http%253A%252F%252Fwww.w3.org%252F2000%252Fsvg%2522%2520viewBox%253D%25220%25200%2520512%2520512%2522%253E%253Crect%2520width%253D%2522512%2522%2520height%253D%2522512%2522%2520rx%253D%252280%2522%2520fill%253D%2522%252301030a%2522%252F%253E%253Ctext%2520x%253D%2522256%2522%2520y%253D%2522340%2522%2520font-size%253D%2522300%2522%2520text-anchor%253D%2522middle%2522%2520fill%253D%2522%2523d9a64a%2522%253E%25E2%2597%2586%253C%252Ftext%253E%253C%252Fsvg%253E%22%2C%22sizes%22%3A%22any%22%2C%22type%22%3A%22image%2Fsvg%2Bxml%22%2C%22purpose%22%3A%22any%22%7D%5D%7D" />
<meta name="mobile-web-app-capable" content="yes" />
<style>
html,body{margin:0;width:100%;height:100%;background:#02040a;overflow:hidden}
iframe{position:fixed;inset:0;width:100%;height:100%;border:0;background:#02040a;opacity:0;visibility:hidden;transition:opacity .12s ease}
iframe.ready{opacity:1;visibility:visible}
</style>
</head>
<body>
<iframe id="appFrame" src="../ACED-Lifestyle/ace-cluster.html?v=cluster-handoff-v2-20260605" title="ACE Cluster"></iframe>
<script>
(function(){
  'use strict';
  var frame=document.getElementById('appFrame');
  var logo='../ACED-Lifestyle/shared/assets/logos/ace-cluster.png';
  var tries=0;

  function brusselsTodayIso(){
    var parts=new Intl.DateTimeFormat('en-CA',{timeZone:'Europe/Brussels',year:'numeric',month:'2-digit',day:'2-digit'}).formatToParts(new Date());
    var map={};
    parts.forEach(function(p){if(p.type!=='literal')map[p.type]=p.value;});
    return map.year+'-'+map.month+'-'+map.day;
  }

  function forceCurrentDay(w){
    var today=brusselsTodayIso();
    if(w.state && w.state.activeDate!==today){
      if(typeof w.setActiveDate==='function')w.setActiveDate(today);
      else {
        w.state.activeDate=today;
        if(typeof w.saveState==='function')w.saveState();
        if(typeof w.buildDayRail==='function')w.buildDayRail();
        if(typeof w.renderChamber==='function')w.renderChamber(w.activeChamber||0);
      }
    }
  }

  function forceMobileElements(doc){
    if(!window.matchMedia('(max-width:760px)').matches)return;
    doc.querySelectorAll('.ace-cluster-zoom-dock,.nce-gauge-ring').forEach(function(el){
      el.style.setProperty('display','none','important');
    });
    doc.querySelectorAll('.nce-gauge-value,.nce-gauge-label').forEach(function(el){
      el.style.setProperty('padding-right','0','important');
      el.style.setProperty('max-width','100%','important');
      el.style.setProperty('position','relative','important');
      el.style.setProperty('z-index','2','important');
    });
  }

  function installMobileLayoutFix(doc,w){
    var old=doc.getElementById('ace-cluster-wrapper-mobile-fix');
    if(old)old.remove();
    var style=doc.createElement('style');
    style.id='ace-cluster-wrapper-mobile-fix';
    style.textContent=''
      +'@media(max-width:760px){'
      +'html body .ace-cluster-zoom-dock{display:none!important}'
      +'html body .nce-gauge-ring{display:none!important}'
      +'html body .nce-gauge{min-height:92px!important;overflow:hidden!important;padding:14px!important}'
      +'html body .nce-gauge-value,html body .nce-gauge-label{padding-right:0!important;max-width:100%!important;position:relative!important;z-index:2!important}'
      +'html body .chamber-body{padding-bottom:24px!important}'
      +'}'
      +'@media(min-width:761px){'
      +'html body .ace-cluster-zoom-dock{display:flex!important;right:10px!important;bottom:74px!important}'
      +'html body .chamber-body{padding-bottom:12px!important}'
      +'}';
    doc.head.appendChild(style);
    forceMobileElements(doc);

    if(typeof w.renderNCE==='function' && !w.renderNCE.__aceGaugeFix){
      var baseNce=w.renderNCE;
      w.renderNCE=function(){
        var out=baseNce.apply(this,arguments);
        setTimeout(function(){forceMobileElements(doc);},0);
        setTimeout(function(){forceMobileElements(doc);},80);
        return out;
      };
      w.renderNCE.__aceGaugeFix=true;
    }
    if(typeof w.renderChamber==='function' && !w.renderChamber.__aceGaugeFix){
      var baseChamber=w.renderChamber;
      w.renderChamber=function(){
        var out=baseChamber.apply(this,arguments);
        setTimeout(function(){forceMobileElements(doc);},0);
        setTimeout(function(){forceMobileElements(doc);},80);
        return out;
      };
      w.renderChamber.__aceGaugeFix=true;
    }
  }

  function autoFetchOpeningData(w){
    if(w.__ACE_CLUSTER_OPEN_FETCH_STARTED__)return true;
    if(typeof w.fetchAllMarketData!=='function' || typeof w.fetchNcePrices!=='function')return false;
    w.__ACE_CLUSTER_OPEN_FETCH_STARTED__=true;
    Promise.resolve()
      .then(function(){return w.fetchAllMarketData();})
      .then(function(){return w.fetchNcePrices();})
      .then(function(){
        if(typeof w.renderChamber==='function')w.renderChamber(w.activeChamber||0);
        setTimeout(function(){try{forceMobileElements(frame.contentDocument);}catch(e){}},120);
      })
      .catch(function(err){
        w.__ACE_CLUSTER_OPEN_FETCH_ERROR__=String(err&&err.message||err||'unknown fetch error');
        console.warn('ACE Cluster opening fetch incomplete',err);
      });
    return true;
  }

  function installDetailedHandoff(w){
    if(w.__ACE_CLUSTER_DETAILED_HANDOFF_V2__)return true;
    if(!w.state || typeof w.buildPayload!=='function')return false;
    w.__ACE_CLUSTER_DETAILED_HANDOFF_V2__=true;
    w.__ACE_CLUSTER_PAYLOAD_MODE__=w.__ACE_CLUSTER_PAYLOAD_MODE__||'research';

    var originalSetPayload=w.setPayload;
    if(typeof originalSetPayload==='function' && !originalSetPayload.__acePayloadModeWrapped){
      w.setPayload=function(mode){
        w.__ACE_CLUSTER_PAYLOAD_MODE__=mode||'research';
        return originalSetPayload.apply(this,arguments);
      };
      w.setPayload.__acePayloadModeWrapped=true;
    }

    var NCE_DEFS=[
      ['CVX','Convex Finance','DeFi'],['RENDER','Render Network','AI'],['PENDLE','Pendle','DeFi'],['BTC','Bitcoin','Macro'],['ETH','Ethereum','L1/L2'],['FET','Artificial Superintelligence Alliance','AI'],['SOL','Solana','L1/L2'],['AAVE','Aave','DeFi'],['TAO','Bittensor','AI'],['ICP','Internet Computer','AI'],['ZEN','Horizen','L1/L2'],['INJ','Injective','L1/L2'],['ILV','Illuvium','Gaming'],['KSM','Kusama','L1/L2'],['SCRT','Secret Network','L1/L2'],['SNX','Synthetix','DeFi'],['ADX','AdEx','AI'],['AR','Arweave','AI'],['CFG','Centrifuge','DeFi'],['EGLD','MultiversX','L1/L2']
    ];

    function num(v,d){v=Number(v);return isFinite(v)?v:(d==null?0:d)}
    function fixed(v,n){return isFinite(Number(v))?Number(v).toFixed(n==null?2:n):'MISSING'}
    function text(v){return String(v==null?'':v).replace(/[\n\r|]+/g,' ').trim()||'MISSING'}
    function money(v){v=Number(v);if(!isFinite(v)||v<=0)return'MISSING';if(v>=1000)return v.toFixed(2);if(v>=1)return v.toFixed(4);return v.toPrecision(6)}

    function portfolioRows(date){
      var dust=num(w.state.settings&&w.state.settings.dustThreshold,10);
      return Object.values(w.state.coins||{}).map(function(c){
        var inp=w.state.inspectInputs&&w.state.inspectInputs[c.symbol]||{};
        var price=num(inp.price||inp.lastPrice,0);
        var qty=num(c.qty||c.seedQty,0);
        var value=price*qty;
        var eso=typeof w.coinEsoResonance==='function'?w.coinEsoResonance(c.symbol,date):null;
        var tri=typeof w.triBadge==='function'?w.triBadge(c.symbol,date):null;
        return{
          symbol:c.symbol,sector:c.sector||'Other',price:price,chg24:num(inp.chg24,NaN),qty:qty,value:value,
          esoState:eso&&eso.tier||'MISSING',esoScore:eso&&eso.score,esoAlign:eso&&eso.alignments||[],esoClash:eso&&eso.clashes||[],
          triState:tri&&tri.badge||'MISSING'
        };
      }).filter(function(r){return r.value>=dust}).sort(function(a,b){return b.value-a.value});
    }

    function nceRows(date){
      if(typeof w.nceCoinScore!=='function')return[];
      return NCE_DEFS.map(function(d){
        var coin={symbol:d[0],name:d[1],sector:d[2]};
        var r=w.nceCoinScore(coin,date);
        var inp=w.state.inspectInputs&&w.state.inspectInputs[coin.symbol]||{};
        return{
          symbol:coin.symbol,name:coin.name,sector:coin.sector,price:num(inp.price||inp.lastPrice,0),chg24:num(inp.chg24,NaN),
          state:r&&r.tier||'MISSING',score:r&&r.score,reasons:r&&r.reasons||[],cycles:r&&r.cycles||[],
          priceRes:r&&r.priceRes||null,primeRes:r&&r.primeRes||null
        };
      }).sort(function(a,b){return num(b.score,0)-num(a.score,0)});
    }

    w.buildPayload=function detailedAceClusterPayload(){
      var mode=w.__ACE_CLUSTER_PAYLOAD_MODE__||'research';
      var date=w.state.activeDate||brusselsTodayIso();
      var generatedAt=new Date().toISOString();
      var numerology=typeof w.calcNumerology==='function'?w.calcNumerology(date):null;
      var bazi=typeof w.baziDay==='function'?w.baziDay(date):null;
      var posture=typeof w.calcMovePosture==='function'?w.calcMovePosture(date):null;
      var market=typeof w.nceMarketScore==='function'?w.nceMarketScore(date):null;
      var holdings=portfolioRows(date);
      var nce=nceRows(date);
      var body=w.state.governance||{};
      var pricedHoldings=holdings.filter(function(r){return r.price>0}).length;
      var pricedNce=nce.filter(function(r){return r.price>0}).length;

      var header=[
        'ACE CLUSTER · STRUCTURED AI HANDOFF V2',
        'DATE='+date,
        'GENERATED_AT='+generatedAt,
        'MODE='+mode,
        'DATA_COVERAGE=portfolio '+pricedHoldings+'/'+holdings.length+' priced; NCE '+pricedNce+'/20 priced',
        '',
        'CRITICAL PARSING RULES',
        '1. An asset appears only after ASSET=. Treat only that ticker as the coin.',
        '2. ESO_STATE=PRIME means the highest esoteric resonance CLASSIFICATION. PRIME is not a coin, ticker, token, or project in this payload.',
        '3. NCE_STATE=CRITICAL/HOT/WARM/COLD and TRI_STATE labels are classifications, not assets.',
        '4. PRIME_NUMBER_MAGNET is a mathematical nearest-prime price feature. It is not the PRIME resonance state and not a coin.',
        '5. MISSING means data was unavailable. Do not infer or fabricate it.',
        '6. Separate observed market data from symbolic/esoteric overlays in the answer.',
        ''
      ].join('\n');

      var field=[
        'FIELD_CONTEXT',
        'PERSONAL_DAY='+(numerology?numerology.personalDay.reduced:'MISSING'),
        'PERSONAL_MONTH='+(numerology?numerology.personalMonth:'MISSING'),
        'PERSONAL_YEAR='+(numerology?numerology.personalYear:'MISSING'),
        'UNIVERSAL_DAY='+(numerology?numerology.universalDay:'MISSING'),
        'BAZI='+(bazi?text(bazi.label)+'; ELEMENT='+text(bazi.stemEl)+'; COMPATIBILITY='+text(bazi.compatibility):'MISSING'),
        'POSTURE='+(posture?text(posture.posture)+'; SCORE='+fixed(posture.score,1)+'; REASONS='+text((posture.reasons||[]).join('; ')):'MISSING'),
        'NCE_MARKET='+(market?text(market.tier)+'; SCORE='+fixed(market.score,1)+'; ARCHETYPE='+text((market.archetype||[]).join('; '))+'; CYCLES='+text((market.cycles||[]).slice(0,4).map(function(c){return c.cycle+'d '+c.anchor+' '+(c.dist===0?'exact':(c.dist>0?'+':'')+c.dist+'d')}).join('; ')):'MISSING'),
        'BODY_STATE='+text(body.bodyState||'green'),
        'BODY_NOTES='+text(body.notes||''),
        ''
      ].join('\n');

      var portfolioBlock='PORTFOLIO_ASSETS\n'+(holdings.slice(0,20).map(function(r){
        return 'ASSET='+r.symbol+
          ' | SECTOR='+text(r.sector)+
          ' | PRICE='+money(r.price)+
          ' | CHG24_PCT='+(isFinite(r.chg24)?fixed(r.chg24,2):'MISSING')+
          ' | QTY='+fixed(r.qty,6)+
          ' | VALUE='+money(r.value)+
          ' | ESO_STATE='+text(r.esoState)+
          ' | ESO_SCORE='+fixed(r.esoScore,1)+
          ' | TRI_STATE='+text(r.triState)+
          ' | ESO_SUPPORT='+text(r.esoAlign.slice(0,3).join('; '))+
          ' | ESO_CAUTION='+text(r.esoClash.slice(0,2).join('; '));
      }).join('\n')||'NONE ABOVE DUST THRESHOLD')+'\n\n';

      var nceBlock='NCE_CORE_20\n'+nce.map(function(r){
        var cycle=r.cycles&&r.cycles[0];
        var gem=r.priceRes?'GEMATRIA_PRICE_MAGNET='+text(r.priceRes.label)+'@'+money(r.priceRes.target)+'; DIST_PCT='+fixed(r.priceRes.rel*100,2):'GEMATRIA_PRICE_MAGNET=MISSING';
        var prime=r.primeRes?'PRIME_NUMBER_MAGNET='+r.primeRes.prime+'/'+r.primeRes.scale+'@'+money(r.primeRes.target)+'; DIST_PCT='+fixed(r.primeRes.rel*100,3):'PRIME_NUMBER_MAGNET=MISSING';
        return 'ASSET='+r.symbol+
          ' | PROJECT='+text(r.name)+
          ' | SECTOR='+text(r.sector)+
          ' | PRICE='+money(r.price)+
          ' | CHG24_PCT='+(isFinite(r.chg24)?fixed(r.chg24,2):'MISSING')+
          ' | NCE_STATE='+text(r.state)+
          ' | NCE_SCORE='+fixed(r.score,1)+
          ' | TOP_CYCLE='+(cycle?cycle.cycle+'d '+text(cycle.anchor)+' '+(cycle.dist===0?'exact':(cycle.dist>0?'+':'')+cycle.dist+'d'):'MISSING')+
          ' | '+gem+
          ' | '+prime+
          ' | REASONS='+text(r.reasons.slice(0,4).join('; '));
      }).join('\n')+'\n\n';

      var task=[
        'ANALYSIS_TASK',
        'A. First list the actual asset tickers you detected. Never list PRIME, HOT, CRITICAL, WARM, COLD, RESONANT, CAUTION, or CLASH as coins.',
        'B. Separate: observed price/change/portfolio facts; NCE cycle and price-resonance outputs; esoteric classification; missing evidence.',
        'C. Rank only the top 3 actual assets for deeper chart inspection. Explain each choice with at least one observed market reason and one overlay reason.',
        'D. Identify contradictions, stale/missing fields, and where a chart screenshot or live search is still required.',
        'E. Do not issue a buy/sell instruction from symbolic resonance alone. Provide WATCH, INSPECT, WAIT, or AVOID posture with falsifiers.',
        'F. Keep PRIME_STATE distinct from PRIME_NUMBER_MAGNET throughout.'
      ].join('\n');

      if(mode==='portfolio')return header+field+portfolioBlock+task;
      if(mode==='esoteric')return header+field+nceBlock+task;
      return header+field+portfolioBlock+nceBlock+task;
    };

    if(typeof w.renderJester==='function')setTimeout(function(){try{w.renderJester();}catch(e){}},80);
    return true;
  }

  function forceReady(){
    tries++;
    try{
      var w=frame.contentWindow;
      var doc=frame.contentDocument;
      if(!w || !doc || !doc.body)return false;

      if(typeof w.bootEnter==='function'){
        try{w.bootEnter();}catch(e){}
      }

      var overlay=doc.getElementById('bootOverlay');
      var gate=doc.getElementById('enterGate');
      if(overlay){overlay.classList.add('boot-exit');overlay.style.display='none';overlay.style.opacity='0';overlay.style.visibility='hidden';overlay.style.pointerEvents='none';}
      if(gate){gate.style.display='none';gate.style.opacity='0';gate.style.visibility='hidden';gate.style.pointerEvents='none';}

      doc.body.classList.remove('booting');
      doc.body.classList.add('ready');

      var shell=doc.getElementById('appShell') || doc.querySelector('.app-shell');
      if(shell){shell.style.opacity='1';shell.style.visibility='visible';shell.style.pointerEvents='auto';}

      var mark=doc.querySelector('.brand-mark');
      if(mark && !mark.dataset.clusterLogoPatched){
        mark.dataset.clusterLogoPatched='1';
        mark.textContent='';
        mark.setAttribute('aria-label','ACE Cluster');
        mark.style.padding='0';
        mark.style.overflow='hidden';
        mark.style.background='rgba(2,4,10,.55)';
        var img=doc.createElement('img');
        img.src=logo;
        img.alt='ACE Cluster';
        img.style.width='100%';
        img.style.height='100%';
        img.style.objectFit='cover';
        img.style.borderRadius='inherit';
        img.style.display='block';
        mark.appendChild(img);
      }

      installMobileLayoutFix(doc,w);
      forceCurrentDay(w);
      autoFetchOpeningData(w);
      installDetailedHandoff(w);
      frame.classList.add('ready');
      return true;
    }catch(e){
      if(tries>12)frame.classList.add('ready');
      return false;
    }
  }

  function startPatchLoop(){
    forceReady();
    var timer=setInterval(function(){
      var ok=forceReady();
      if((ok && frame.contentWindow.__ACE_CLUSTER_OPEN_FETCH_STARTED__ && frame.contentWindow.__ACE_CLUSTER_DETAILED_HANDOFF_V2__) || tries>50)clearInterval(timer);
    },150);
  }

  function resync(){
    tries=0;
    setTimeout(startPatchLoop,0);
  }

  frame.addEventListener('load',startPatchLoop);
  window.addEventListener('pageshow',resync);
  window.addEventListener('focus',resync);
  document.addEventListener('visibilitychange',function(){if(!document.hidden)resync();});
  setTimeout(startPatchLoop,700);
})();
</script>
</body>
</html>
