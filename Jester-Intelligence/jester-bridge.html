<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover" />
<meta name="theme-color" content="#02040a" />
<title>Jester Bridge</title>
<style>
:root{--bg:#01030a;--panel:rgba(4,11,25,.92);--panel2:rgba(7,20,42,.78);--gold:#d9a64a;--gold2:#fff0ad;--cyan:#20e7ff;--violet:#8b5cf6;--text:#fff5d6;--muted:#9fb4ce;--line:rgba(217,166,74,.34);--ok:#39e6a7;--warn:#ffe169;--bad:#ff4f6d;--shadow:0 26px 90px rgba(0,0,0,.68),0 0 42px rgba(32,231,255,.045);--ease:cubic-bezier(.22,1,.36,1)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--text);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;touch-action:pan-x pan-y pinch-zoom}body{overflow-x:hidden;background:radial-gradient(circle at 50% -10%,rgba(32,231,255,.20),transparent 30%),radial-gradient(circle at 82% 8%,rgba(139,92,246,.16),transparent 31%),radial-gradient(circle at 18% 10%,rgba(217,166,74,.13),transparent 28%),linear-gradient(180deg,#01030a 0%,#061224 48%,#02050d 100%)}button,textarea{font:inherit;color:inherit}button{border:0;cursor:pointer}.shell{min-height:100vh;padding:14px 14px 100px}.topbar{position:sticky;top:0;z-index:10;padding:0 0 10px;background:linear-gradient(180deg,rgba(1,3,10,.96),rgba(1,3,10,.72),transparent);backdrop-filter:blur(16px)}.brand{max-width:980px;margin:0 auto;border:1px solid var(--line);border-radius:28px;background:radial-gradient(circle at 50% 0%,rgba(32,231,255,.08),transparent 36%),linear-gradient(145deg,rgba(5,16,36,.90),rgba(1,4,12,.76));box-shadow:var(--shadow);padding:14px;display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.title{font-size:1.08rem;font-weight:900;color:var(--gold2);letter-spacing:.04em}.sub{font-size:.78rem;color:var(--muted);margin-top:3px}.status{border:1px solid rgba(217,166,74,.30);background:rgba(4,12,26,.82);border-radius:999px;padding:7px 10px;font-size:.72rem;color:var(--muted);white-space:nowrap}.status.ok{color:var(--ok);border-color:rgba(57,230,167,.38)}.status.wait{color:var(--warn);border-color:rgba(255,225,105,.35)}.status.bad{color:var(--bad);border-color:rgba(255,79,109,.35)}.main{max-width:980px;margin:0 auto;display:grid;gap:12px}.card{border:1px solid rgba(217,166,74,.25);border-radius:24px;background:radial-gradient(circle at 50% 0%,rgba(32,231,255,.055),transparent 34%),linear-gradient(145deg,rgba(3,11,27,.82),rgba(1,5,14,.70));box-shadow:0 14px 42px rgba(0,0,0,.32),inset 0 1px 0 rgba(255,240,173,.045);padding:14px}.row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center}.label{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:7px}.big{font-size:1rem;font-weight:900;color:#fff7dc}.small{font-size:.82rem;line-height:1.45;color:#b7c8dc}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.btn{border:1px solid rgba(217,166,74,.30);background:radial-gradient(circle at 50% 0%,rgba(32,231,255,.08),transparent 42%),rgba(4,12,26,.82);border-radius:14px;padding:11px 10px;color:var(--gold2);min-height:42px}.btn.primary{border-color:rgba(32,231,255,.64);background:linear-gradient(135deg,rgba(32,231,255,.13),rgba(139,92,246,.12));color:#dffbff}.btn.model{border-color:rgba(139,92,246,.36);color:#ddd6fe}.btn.model:active,.btn.primary:active{transform:scale(.985)}textarea,.payload{width:100%;border:1px solid rgba(217,166,74,.22);background:rgba(0,0,0,.30);border-radius:18px;padding:12px;color:var(--text);outline:none;min-height:220px;resize:vertical;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;font-size:.76rem;line-height:1.5}.payload{white-space:pre-wrap;word-break:break-word;overflow:auto;max-height:48vh}.pill{display:inline-grid;place-items:center;border:1px solid rgba(255,255,255,.12);border-radius:999px;padding:5px 8px;font-size:.72rem;font-weight:850;color:#dffbff;background:rgba(32,231,255,.08);margin:2px 4px 2px 0}.handoff-gate{position:fixed;inset:0;z-index:50;display:none;place-items:center;background:#000}.handoff-gate.open{display:grid}.handoff-card{width:min(82vw,420px);min-height:240px;border:1px solid rgba(217,166,74,.44);border-radius:34px;background:radial-gradient(circle at 50% 20%,rgba(32,231,255,.12),transparent 42%),linear-gradient(145deg,rgba(7,18,36,.96),rgba(1,3,10,.98));box-shadow:0 0 80px rgba(217,166,74,.12),0 24px 80px rgba(0,0,0,.65);display:grid;place-items:center;text-align:center;padding:34px}.mark{width:92px;height:92px;border-radius:30px;border:1px solid rgba(255,240,173,.52);display:grid;place-items:center;margin:0 auto 18px;background:radial-gradient(circle at 50% 35%,rgba(217,166,74,.24),rgba(32,231,255,.11));color:var(--gold2);font-size:1.25rem;font-weight:900}.toast{position:fixed;left:50%;top:18px;transform:translateX(-50%) translateY(-20px);opacity:0;z-index:80;background:rgba(1,3,10,.96);border:1px solid rgba(217,166,74,.48);border-radius:18px;padding:12px 14px;box-shadow:var(--shadow);transition:opacity 250ms,transform 250ms;color:var(--gold2);pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}@media(max-width:720px){.grid{grid-template-columns:1fr 1fr}.brand{grid-template-columns:1fr}.status{justify-self:start}.shell{padding:10px 10px 100px}}@media(max-width:460px){.grid{grid-template-columns:1fr}.card{border-radius:20px}}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <div class="brand">
      <div>
        <div class="title">Jester Bridge</div>
        <div class="sub">Messenger tab for ACE Mind. The app remains sovereign.</div>
      </div>
      <div id="status" class="status wait">Waiting for ACE Mind</div>
    </div>
  </header>
  <main class="main">
    <section class="card">
      <div class="row">
        <div>
          <div class="label">Current packet</div>
          <div id="summary" class="big">No packet received yet.</div>
          <div id="meta" class="small">Open ACE Mind, then tap Bridge or Refresh.</div>
        </div>
        <button class="btn primary" onclick="requestState()">Refresh</button>
      </div>
    </section>

    <section class="card">
      <div class="label">Council models</div>
      <div class="grid" id="modelGrid"></div>
    </section>

    <section class="card">
      <div class="label">Payload</div>
      <div class="grid" style="margin-bottom:10px"><button class="btn primary" onclick="copyPayload()">Copy Payload</button><button class="btn" onclick="downloadPayload()">Export Payload</button><button class="btn" onclick="clearPayload()">Clear View</button></div>
      <pre id="payloadPre" class="payload">Waiting for ACE Mind…</pre>
    </section>

    <section class="card">
      <div class="label">Response collector</div>
      <textarea id="responseBox" placeholder="Paste model answers or JSON patches here. ACE Mind still applies changes only through its Patch console or import flow."></textarea>
      <div class="grid" style="margin-top:10px"><button class="btn" onclick="copyResponse()">Copy Response</button><button class="btn" onclick="downloadResponse()">Export Response</button></div>
    </section>
  </main>
</div>
<div class="handoff-gate" id="handoffGate"><div class="handoff-card"><div><div class="mark" id="handoffMark">AI</div><div class="big" id="handoffName">Opening</div><div class="small" style="margin-top:8px">Payload copied if browser allowed it.</div></div></div></div>
<div class="toast" id="toast"></div>
<script>
'use strict';
const JESTER_CHANNEL='ace-mind-jester-v1';
const JESTER_LS_KEY='ace_bridge_payload';
const MODELS=[['Gemini','https://gemini.google.com/app','GM'],['ChatGPT','https://chatgpt.com/','CG'],['Claude','https://claude.ai/','CL'],['DeepSeek','https://chat.deepseek.com/','DS'],['Perplexity','https://www.perplexity.ai/','PX'],['Grok','https://grok.com/','GK'],['Copilot','https://copilot.microsoft.com/','CP'],['AI Mode','https://www.google.com/search?udm=50&q=AI%20Mode','AI']];
let channel=null;
let lastEnvelope=null;
let lastPayloadText='';
let lastReceivedAt=0;
function $(id){return document.getElementById(id)}
function toast(msg){const el=$('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1800)}
function setStatus(text,kind='wait'){const el=$('status');el.textContent=text;el.className='status '+kind}
function safeFileName(s){return String(s||'jester').toLowerCase().replace(/[^a-z0-9_-]+/g,'-').replace(/^-+|-+$/g,'').slice(0,60)||'jester'}
function renderModels(){const grid=$('modelGrid');grid.innerHTML=MODELS.map(([name,url,mark])=>`<button class="btn model" type="button" data-name="${escapeHtml(name)}" data-url="${escapeHtml(url)}" data-mark="${escapeHtml(mark)}">${escapeHtml(name)}</button>`).join('');grid.querySelectorAll('button').forEach(btn=>btn.addEventListener('click',()=>openModel(btn.dataset.name,btn.dataset.url,btn.dataset.mark)));}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function normalizeModelUrl(name,url){if(name==='Gemini')return 'https://gemini.google.com/app';if(name==='ChatGPT')return 'https://chatgpt.com/';return url}
function connect(){if('BroadcastChannel' in window){try{channel=new BroadcastChannel(JESTER_CHANNEL);channel.onmessage=(ev)=>handleMessage(ev.data||{});setStatus('Bridge listening','wait')}catch(e){channel=null;setStatus('Fallback mode','wait')}}else{setStatus('Fallback mode','wait')}}
function post(msg){try{if(channel)channel.postMessage(msg)}catch(e){}}
function handleMessage(msg){if(!msg||msg.source==='bridge')return;if(msg.type==='payload')applyEnvelope(msg,'channel');if(msg.type==='JESTER_PONG'||msg.type==='pong')setStatus('Connected to ACE Mind','ok');}
function requestState(){post({type:'request_state',ts:Date.now(),source:'bridge',version:'1.0',payload:null});post({type:'JESTER_PING',ts:Date.now(),source:'bridge',version:'1.0',payload:null});const ok=loadFallback();if(!ok)setStatus('Request sent','wait');setTimeout(()=>{if(Date.now()-lastReceivedAt>1200)loadFallback(true)},1200)}
function loadFallback(markStale=false){try{const raw=localStorage.getItem(JESTER_LS_KEY);if(!raw)return false;const env=JSON.parse(raw);if(!env||!env.payload)return false;if(!lastEnvelope||Number(env.ts||0)>=Number(lastEnvelope.ts||0)){applyEnvelope(env,'fallback');return true}}catch(e){}if(markStale)setStatus('Waiting for ACE Mind','wait');return false}
function applyEnvelope(env,source){lastEnvelope=env;lastReceivedAt=Date.now();const payload=env.payload||{};lastPayloadText=JSON.stringify(payload,null,2);$('payloadPre').textContent=lastPayloadText;$('summary').textContent=`${payload.app||'ACE Mind'} · ${payload.active_day||'current day'} · ${payload.active_chamber||'spades'}`;const tags=[];if(payload.day_summary?.focus)tags.push(payload.day_summary.focus);if(payload.day_summary?.theon)tags.push(payload.day_summary.theon);if(payload.day_summary?.supplement_mode)tags.push(payload.day_summary.supplement_mode);$('meta').innerHTML=`<span class="pill">${escapeHtml(source)}</span><span class="pill">${new Date(env.ts||Date.now()).toLocaleTimeString()}</span>`+tags.slice(0,3).map(t=>`<span class="pill">${escapeHtml(t)}</span>`).join('');setStatus('Connected to ACE Mind','ok');post({type:'SYNC_ACK',ts:Date.now(),source:'bridge',version:'1.0',payload:{received_ts:env.ts||null}})}
function clearPayload(){$('payloadPre').textContent='Waiting for ACE Mind…';$('summary').textContent='No packet received yet.';$('meta').textContent='Open ACE Mind, then tap Bridge or Refresh.';lastPayloadText='';lastEnvelope=null;setStatus('Cleared','wait')}
async function copyText(text){try{if(navigator.clipboard&&window.isSecureContext!==false){await navigator.clipboard.writeText(text);return true}}catch(e){}try{const ta=document.createElement('textarea');ta.value=text;ta.setAttribute('readonly','');ta.style.position='fixed';ta.style.top='0';ta.style.left='0';ta.style.width='1px';ta.style.height='1px';ta.style.opacity='0';document.body.appendChild(ta);ta.focus();ta.select();ta.setSelectionRange(0,ta.value.length);const ok=document.execCommand('copy');ta.remove();if(ok)return true}catch(e){}return false}
function copyPayload(){if(!lastPayloadText){toast('No payload yet');return}copyText(lastPayloadText).then(ok=>toast(ok?'Payload copied':'Copy failed'))}
function copyResponse(){const text=$('responseBox').value||'';if(!text.trim()){toast('No response yet');return}copyText(text).then(ok=>toast(ok?'Response copied':'Copy failed'))}
function downloadText(text,name){const blob=new Blob([text],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(url),500)}
function downloadPayload(){if(!lastPayloadText){toast('No payload yet');return}downloadText(lastPayloadText,'jester-bridge-payload-'+safeFileName(lastEnvelope?.payload?.active_day)+'.json')}
function downloadResponse(){const text=$('responseBox').value||'';if(!text.trim()){toast('No response yet');return}const pack={packet_type:'jester_bridge_response',created_at:new Date().toISOString(),source_payload_meta:lastEnvelope?{app:lastEnvelope.payload?.app,version:lastEnvelope.payload?.version,active_day:lastEnvelope.payload?.active_day,active_chamber:lastEnvelope.payload?.active_chamber}:null,response:text};downloadText(JSON.stringify(pack,null,2),'jester-bridge-response-'+new Date().toISOString().slice(0,10)+'.json')}
function openModel(name,url,mark){const target=normalizeModelUrl(name,url);let opened=null;try{opened=window.open('about:blank','_blank')}catch(e){opened=null}const payload=lastPayloadText||'';if(!payload){toast('No payload yet. Refresh first.')}else{copyText(payload).then(ok=>toast(ok?'Copied for '+name:'Opening '+name+'. Payload visible here.'))}
  const gate=$('handoffGate'),markEl=$('handoffMark'),nameEl=$('handoffName');if(markEl)markEl.textContent=mark||'AI';if(nameEl)nameEl.textContent=name||'Opening';if(gate)gate.classList.add('open');setTimeout(()=>{try{if(opened&&!opened.closed){opened.location.href=target;opened.focus();}else{window.open(target,'_blank')}}catch(e){try{window.location.href=target}catch(_){}}setTimeout(()=>gate?.classList.remove('open'),900)},420)}
window.addEventListener('storage',ev=>{if(ev.key===JESTER_LS_KEY)loadFallback()});
window.addEventListener('focus',()=>{loadFallback();requestState()});
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible'){loadFallback();requestState()}});
setInterval(()=>post({type:'alive',ts:Date.now(),source:'bridge',version:'1.0',payload:null}),10000);
setInterval(()=>{if(Date.now()-lastReceivedAt>3000)loadFallback()},3000);
window.addEventListener('DOMContentLoaded',()=>{renderModels();connect();loadFallback();setTimeout(requestState,120);setTimeout(()=>{if(Date.now()-lastReceivedAt>900)setStatus('Waiting for ACE Mind','wait')},900)});
</script>
</body>
</html>
