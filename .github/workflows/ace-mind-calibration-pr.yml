name: Validate ACE Mind Calibration PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - '.github/ace-mind-calibration/trigger.txt'

permissions:
  contents: write

jobs:
  patch-and-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Reconstruct patch
        run: |
          cat .github/ace-mind-calibration/patch.part.00 .github/ace-mind-calibration/patch.part.01 | base64 --decode | gzip --decompress > /tmp/patch_ace_repo.py
          echo '5050717d2dd3331abe86c60ba5cee5abdd0bb2b9de2c1a55d2267d7381b512d8  /tmp/patch_ace_repo.py' | sha256sum --check
      - name: Apply patch
        run: python /tmp/patch_ace_repo.py
      - name: Validate patched app
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          t=Path('Jester-Intelligence/ACED-Lifestyle/ace-mind.html').read_text(encoding='utf-8')
          tags=re.findall(r'<script([^>]*)>(.*?)</script>',t,re.S|re.I)
          scripts='\n'.join(body for attrs,body in tags if 'application/json' not in attrs.lower())
          Path('/tmp/ace-mind.js').write_text(scripts,encoding='utf-8')
          required=["1.7.0-calibration-bridge-2026-06-16","time_local:'09:00'","universal_time:'08:00'","18°20′09″ Virgo","16°23′57″ Gemini","FAIL_CLOSED_SUPPORT_ONLY","Om Bum Budhaya Namaha · Om Budhaya Namaha"]
          missing=[x for x in required if x not in t]
          if missing: raise SystemExit('Missing invariants: '+repr(missing))
          print('ACE Mind calibration invariants present')
          PY
          node --check /tmp/ace-mind.js
      - name: Commit repaired app to PR branch
        run: |
          git config user.name 'ACE Mind Calibration Governor'
          git config user.email 'actions@users.noreply.github.com'
          git add Jester-Intelligence/ACED-Lifestyle/ace-mind.html
          if ! git diff --cached --quiet; then
            git commit -m 'fix(ace-mind): apply v25.3.7 calibration bridge'
            git push origin HEAD:${{ github.head_ref }}
          fi
