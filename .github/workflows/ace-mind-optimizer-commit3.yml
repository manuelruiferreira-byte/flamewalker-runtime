name: Validate ACE Mind Optimizer Commit 3

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - '.github/ace-mind-optimizer/commit3-trigger.txt'
      - '.github/ace-mind-optimizer/commit3-payload.b64'
      - '.github/workflows/ace-mind-optimizer-commit3.yml'

permissions:
  contents: write

jobs:
  unpack-test-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Verify and unpack optimizer payload
        shell: bash
        run: |
          base64 --decode --ignore-garbage .github/ace-mind-optimizer/commit3-payload.b64 > /tmp/commit3.tgz
          echo '54026ebfd6a4ac81117f98f77cfd8a7b6e6d7251b3db792433cd7c7a51e6ee58  /tmp/commit3.tgz' | sha256sum --check
          tar -tzf /tmp/commit3.tgz
          tar -xzf /tmp/commit3.tgz

      - name: Validate source syntax
        shell: bash
        run: |
          find Jester-Intelligence/packages/engines/supplement -name '*.mjs' -print0 | xargs -0 -n1 node --check

      - name: Validate upstream layers
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-layer-engines.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json

      - name: Validate individual optimizer
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-individual-optimizer.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json

      - name: Commit validated optimizer to branch
        shell: bash
        run: |
          git config user.name 'ACE Mind Optimizer Governor'
          git config user.email 'actions@users.noreply.github.com'
          git add Jester-Intelligence/packages/engines/supplement
          if ! git diff --cached --quiet; then
            git commit -m 'feat(ace-mind): add individual supplement optimizer'
            git push origin HEAD:${{ github.head_ref }}
          fi
