name: Validate ACE Mind Optimizer Commit 5

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - 'Jester-Intelligence/ACED-Lifestyle/ace-mind.html'
      - 'Jester-Intelligence/ACED-Lifestyle/shared/js/ace-mind-optimizer-shadow.mjs'
      - 'Jester-Intelligence/ACED-Lifestyle/scripts/install-ace-mind-optimizer-shadow.mjs'
      - 'Jester-Intelligence/packages/engines/supplement/**'
      - '.github/workflows/ace-mind-optimizer-commit5.yml'

permissions:
  contents: write

jobs:
  install-and-validate-shadow:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Install shadow script tag idempotently
        run: node Jester-Intelligence/ACED-Lifestyle/scripts/install-ace-mind-optimizer-shadow.mjs Jester-Intelligence/ACED-Lifestyle/ace-mind.html

      - name: Validate module syntax
        shell: bash
        run: |
          node --check Jester-Intelligence/ACED-Lifestyle/shared/js/ace-mind-optimizer-shadow.mjs
          node --check Jester-Intelligence/ACED-Lifestyle/scripts/install-ace-mind-optimizer-shadow.mjs
          find Jester-Intelligence/packages/engines/supplement -name '*.mjs' -print0 | xargs -0 -n1 node --check

      - name: Validate optimizer engines and audit
        shell: bash
        run: |
          node Jester-Intelligence/ACED-Lifestyle/scripts/validate-supplement-registry.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json
          node Jester-Intelligence/packages/engines/supplement/tests/validate-layer-engines.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json
          node Jester-Intelligence/packages/engines/supplement/tests/validate-individual-optimizer.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json
          node Jester-Intelligence/packages/engines/supplement/tests/audit-optimizer-28-90.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json

      - name: Validate ACE Mind HTML contains shadow loader
        shell: bash
        run: |
          grep -F './shared/js/ace-mind-optimizer-shadow.mjs' Jester-Intelligence/ACED-Lifestyle/ace-mind.html
          grep -F 'id="ace-mind-optimizer-shadow-loader"' Jester-Intelligence/ACED-Lifestyle/ace-mind.html

      - name: Commit installed loader to branch
        shell: bash
        run: |
          git config user.name 'ACE Mind Shadow Governor'
          git config user.email 'actions@users.noreply.github.com'
          git add Jester-Intelligence/ACED-Lifestyle/ace-mind.html
          if ! git diff --cached --quiet; then
            git commit -m 'feat(ace-mind): install optimizer shadow loader'
            git push origin HEAD:${{ github.head_ref }}
          fi
