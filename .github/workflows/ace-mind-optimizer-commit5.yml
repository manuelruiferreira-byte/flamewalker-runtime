name: Validate ACE Mind Optimizer Commit 5

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - 'Jester-Intelligence/ACED-Lifestyle/shared/optimizer/**'
      - 'Jester-Intelligence/ACED-Lifestyle/scripts/apply-optimizer-shadow-bridge.mjs'
      - 'Jester-Intelligence/ACED-Lifestyle/ace-mind.html'
      - 'Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/**'
      - 'Jester-Intelligence/packages/engines/supplement/**'
      - '.github/workflows/ace-mind-optimizer-commit5.yml'

permissions:
  contents: write

jobs:
  patch-and-validate-shadow:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply idempotent shadow bridge
        run: node Jester-Intelligence/ACED-Lifestyle/scripts/apply-optimizer-shadow-bridge.mjs Jester-Intelligence/ACED-Lifestyle/ace-mind.html

      - name: Validate source syntax
        shell: bash
        run: |
          node --check Jester-Intelligence/ACED-Lifestyle/shared/optimizer/shadow-context-adapter.mjs
          node --check Jester-Intelligence/ACED-Lifestyle/shared/optimizer/ace-mind-optimizer-shadow.mjs
          node --check Jester-Intelligence/ACED-Lifestyle/scripts/apply-optimizer-shadow-bridge.mjs
          node --check Jester-Intelligence/packages/engines/supplement/tests/validate-shadow-context-adapter.mjs

      - name: Validate bridge cardinality
        shell: bash
        run: |
          count=$(grep -F -c '<script type="module" src="./shared/optimizer/ace-mind-optimizer-shadow.mjs"></script>' Jester-Intelligence/ACED-Lifestyle/ace-mind.html)
          test "$count" -eq 1

      - name: Validate browser module imports fail-open in Node
        run: node -e "import('./Jester-Intelligence/ACED-Lifestyle/shared/optimizer/ace-mind-optimizer-shadow.mjs').then(()=>console.log('shadow import ok'))"

      - name: Validate canonical registry
        run: node Jester-Intelligence/ACED-Lifestyle/scripts/validate-supplement-registry.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json

      - name: Validate upstream layers
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-layer-engines.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json

      - name: Validate focused optimizer
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-individual-optimizer.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json

      - name: Run 28-day and 90-day audit
        run: node Jester-Intelligence/packages/engines/supplement/tests/audit-optimizer-28-90.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json

      - name: Validate shadow context adapter
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-shadow-context-adapter.mjs

      - name: Commit patched HTML to PR branch
        shell: bash
        run: |
          git config user.name 'ACE Mind Shadow Governor'
          git config user.email 'actions@users.noreply.github.com'
          git add Jester-Intelligence/ACED-Lifestyle/ace-mind.html
          if ! git diff --cached --quiet; then
            git commit -m 'feat(ace-mind): load optimizer in read-only shadow mode'
            git push origin HEAD:${{ github.head_ref }}
          fi
