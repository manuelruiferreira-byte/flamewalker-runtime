name: Validate ACE Mind Block-Free Supplement Authority

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - 'Jester-Intelligence/ACED-Lifestyle/ace-mind.html'
      - 'Jester-Intelligence/ACED-Lifestyle/shared/optimizer/**'
      - 'Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/**'
      - 'Jester-Intelligence/ACED-Lifestyle/scripts/**supplement**'
      - 'Jester-Intelligence/packages/engines/supplement/**'
      - '.github/workflows/ace-mind-visible-authority.yml'

permissions:
  contents: read

jobs:
  validate-block-free-authority:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request merge ref
        uses: actions/checkout@v4

      - name: Validate source syntax
        shell: bash
        run: |
          node --check Jester-Intelligence/ACED-Lifestyle/shared/optimizer/live-context-adapter.mjs
          node --check Jester-Intelligence/ACED-Lifestyle/shared/optimizer/optimizer-visible-model.mjs
          node --check Jester-Intelligence/ACED-Lifestyle/shared/optimizer/optimizer-visible-model-v2.mjs
          node --check Jester-Intelligence/ACED-Lifestyle/shared/optimizer/optimizer-visible-renderer.mjs
          node --check Jester-Intelligence/ACED-Lifestyle/shared/optimizer/ace-mind-optimizer-live-v2.mjs
          node --check Jester-Intelligence/ACED-Lifestyle/shared/optimizer/ace-mind-optimizer-shadow.mjs
          node --check Jester-Intelligence/packages/engines/supplement/functional-overlap-engine.mjs
          node --check Jester-Intelligence/packages/engines/supplement/tests/validate-block-free.mjs
          node --check Jester-Intelligence/packages/engines/supplement/tests/validate-live-context-adapter.mjs
          node --check Jester-Intelligence/packages/engines/supplement/tests/validate-visible-supplement-authority.mjs
          node --check Jester-Intelligence/packages/engines/supplement/tests/validate-visible-supplement-authority-v2.mjs

      - name: Validate live individual optimizer import
        run: node -e "import('./Jester-Intelligence/ACED-Lifestyle/shared/optimizer/ace-mind-optimizer-live-v2.mjs').then(()=>console.log('block-free live authority import ok'))"

      - name: Validate canonical registry v1 baseline
        run: node Jester-Intelligence/ACED-Lifestyle/scripts/validate-supplement-registry.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json

      - name: Validate canonical registry v2 production
        run: node Jester-Intelligence/ACED-Lifestyle/scripts/validate-supplement-registry-v2.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v2.json

      - name: Validate upstream layers v1 baseline
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-layer-engines.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json

      - name: Validate focused optimizer v1 baseline
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-individual-optimizer.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json

      - name: Validate focused optimizer v2 production
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-individual-optimizer.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v2.json

      - name: Run 28-day and 90-day audit
        run: node Jester-Intelligence/packages/engines/supplement/tests/audit-optimizer-28-90.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json

      - name: Validate canonical card schema v2
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-card-schema-v2.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v2.json

      - name: Enforce permanent block-free architecture
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-block-free.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v2.json

      - name: Validate esoteric convergence labels v2
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-esoteric-convergence.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v2.json

      - name: Validate functional overlap engine v2
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-functional-overlap.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v2.json

      - name: Validate daily variation simulation v2
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-simulation-variation.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v2.json

      - name: Validate weekly-limited herb governance v2
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-weekly-limited.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v2.json

      - name: Validate live day body and untick adapter
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-live-context-adapter.mjs

      - name: Validate visible supplement authority v1
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-visible-supplement-authority.mjs

      - name: Validate visible supplement authority v2
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-visible-supplement-authority-v2.mjs

      - name: Prohibit legacy visible status words
        shell: bash
        run: |
          ! grep -R -E "HIGHLIGHT|SUPPORT|OPTIMAL" Jester-Intelligence/ACED-Lifestyle/shared/optimizer/optimizer-visible-*.mjs
