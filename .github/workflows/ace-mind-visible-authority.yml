name: Validate ACE Mind Canonical Card Authority

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - 'Jester-Intelligence/ACED-Lifestyle/ace-mind.html'
      - 'Jester-Intelligence/ACED-Lifestyle/shared/js/flamewalker-canonical-profile-v3-3.js'
      - 'Jester-Intelligence/ACED-Lifestyle/shared/optimizer/**'
      - 'Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/**'
      - 'Jester-Intelligence/ACED-Lifestyle/scripts/**supplement**'
      - 'Jester-Intelligence/packages/engines/supplement/**'
      - '.github/workflows/ace-mind-visible-authority.yml'

permissions:
  contents: read

jobs:
  validate-canonical-card-authority:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull request merge ref
        uses: actions/checkout@v4

      - name: Validate source syntax
        shell: bash
        run: |
          node --check Jester-Intelligence/ACED-Lifestyle/shared/js/flamewalker-canonical-profile-v3-3.js
          node --check Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/canonical-policy-v3.mjs
          node --check Jester-Intelligence/ACED-Lifestyle/shared/optimizer/legacy-supplement-firewall.mjs
          node --check Jester-Intelligence/ACED-Lifestyle/shared/optimizer/live-context-adapter.mjs
          node --check Jester-Intelligence/ACED-Lifestyle/shared/optimizer/shadow-context-adapter.mjs
          node --check Jester-Intelligence/ACED-Lifestyle/shared/optimizer/optimizer-visible-model-v2.mjs
          node --check Jester-Intelligence/ACED-Lifestyle/shared/optimizer/optimizer-visible-renderer.mjs
          node --check Jester-Intelligence/ACED-Lifestyle/shared/optimizer/ace-mind-optimizer-live-v2.mjs
          node --check Jester-Intelligence/packages/engines/supplement/esoteric-fit-engine.mjs
          node --check Jester-Intelligence/packages/engines/supplement/frequency-persistence-engine.mjs
          node --check Jester-Intelligence/packages/engines/supplement/canonical-policy-optimizer.mjs
          node --check Jester-Intelligence/packages/engines/supplement/tests/validate-canonical-policy-v3-root.mjs
          node --check Jester-Intelligence/packages/engines/supplement/tests/validate-canonical-rotation-v3.mjs
          node --check Jester-Intelligence/packages/engines/supplement/tests/validate-esoteric-authority-v3.mjs

      - name: Validate canonical registry v1 baseline
        run: node Jester-Intelligence/ACED-Lifestyle/scripts/validate-supplement-registry.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json

      - name: Validate canonical registry v2 source
        run: node Jester-Intelligence/ACED-Lifestyle/scripts/validate-supplement-registry-v2.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v2.json

      - name: Validate complete 42-card policy
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-canonical-policy-v3-root.mjs

      - name: Validate numerology-first esoteric authority
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-esoteric-authority-v3.mjs

      - name: Validate 28-day canonical rotation
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-canonical-rotation-v3.mjs

      - name: Validate original layer contracts
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-layer-engines.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json

      - name: Validate focused optimizer baseline
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-individual-optimizer.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v1.json

      - name: Validate functional overlap
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-functional-overlap.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v2.json

      - name: Validate live context and untick history
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-live-context-adapter.mjs

      - name: Validate visible authority contracts
        shell: bash
        run: |
          node Jester-Intelligence/packages/engines/supplement/tests/validate-visible-supplement-authority.mjs
          node Jester-Intelligence/packages/engines/supplement/tests/validate-visible-supplement-authority-v2.mjs

      - name: Enforce block-free visible path
        run: node Jester-Intelligence/packages/engines/supplement/tests/validate-block-free.mjs Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/supplement-registry.v2.json

      - name: Prohibit legacy visible status words
        shell: bash
        run: |
          ! grep -R -E "HIGHLIGHT|SUPPORT|OPTIMAL" Jester-Intelligence/ACED-Lifestyle/shared/optimizer/optimizer-visible-*.mjs
