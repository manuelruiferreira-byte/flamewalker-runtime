name: ACE Mind Policy Diagnostics

on:
  pull_request:
    branches: [main]
    paths:
      - 'Jester-Intelligence/ACED-Lifestyle/shared/data/supplements/**'
      - 'Jester-Intelligence/ACED-Lifestyle/shared/optimizer/**'
      - 'Jester-Intelligence/ACED-Lifestyle/shared/js/flamewalker-canonical-profile-v3-3.js'
      - 'Jester-Intelligence/packages/engines/supplement/**'
      - '.github/workflows/ace-mind-policy-diagnostics.yml'

permissions:
  contents: read

jobs:
  policy-diagnostics:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Run canonical policy validation and capture output
        id: policy
        continue-on-error: true
        shell: bash
        run: |
          set +e
          node Jester-Intelligence/packages/engines/supplement/tests/validate-canonical-policy-v3.mjs > policy-diagnostics.log 2>&1
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          cat policy-diagnostics.log
          exit $code
      - name: Upload policy diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ace-mind-policy-diagnostics
          path: policy-diagnostics.log
          if-no-files-found: error
      - name: Preserve failure status
        if: steps.policy.outcome == 'failure'
        run: exit 1
