name: Validate ACE Mind Supplement Registry

on:
  pull_request:
    branches: [main]
    paths:
      - 'Jester-Intelligence/packages/engines/supplement/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  registry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node Jester-Intelligence/packages/engines/supplement/validate-registry.mjs
